common_patterns:
  - name: Non-Production Environment Scheduling
    description: Automate shutdown and startup of development, staging, and test environments to match business hours.
      Eliminates weekend and overnight compute waste for idle resources.
    typical_savings: Up to 70% reduction in non-production compute costs
    implementation_effort: Low
    risk: Low
    eligibility: Any organization with dev/test/staging environments running 24/7
  - name: ARM-Based Instance Migration (Graviton)
    description: Migrate Linux workloads from x86 to ARM-based instances (AWS Graviton, Azure ARM, GCP T2A) for better
      price-performance ratio.
    typical_savings: 20-40% compute cost reduction
    implementation_effort: Low
    risk: Low
    eligibility: Linux workloads compatible with ARM architecture; requires application recompilation for some languages
  - name: Reserved Instance and Savings Plan Optimization
    description: Shift from on-demand pricing to committed use discounts (Reserved Instances, Savings Plans, Committed Use
      Contracts) for steady-state workloads.
    typical_savings: 30-60% discount vs on-demand pricing
    implementation_effort: Medium
    risk: Low
    eligibility: Workloads with predictable usage patterns and committed capacity needs
  - name: Kubernetes Right-Sizing
    description: Analyze requested vs actual CPU/memory utilization and adjust resource requests to eliminate
      over-provisioning in containerized workloads.
    typical_savings: 30-50% reduction in Kubernetes cluster costs
    implementation_effort: Medium
    risk: Medium
    eligibility: Organizations running Kubernetes clusters (EKS, AKS, GKE) with measurable idle capacity
  - name: Lift-and-Shift to Cloud-Native Refactoring
    description: Move beyond simple rehosting to replatform or refactor applications to leverage managed services (RDS,
      Aurora, ElastiCache, serverless).
    typical_savings: 40-60% operational cost reduction over 2-3 years
    implementation_effort: High
    risk: Medium
    eligibility: Applications with architectural dependencies amenable to modernization; requires development resources
  - name: Automated Data Tiering
    description: Implement lifecycle policies to automatically move cold or infrequently accessed data to archive storage
      tiers (S3 Glacier, Azure Cool Blob, GCS Archive).
    typical_savings: 60-80% storage cost reduction for qualifying data
    implementation_effort: Low
    risk: Low
    eligibility: Workloads with data that can be classified as cold, archival, or infrequently accessed (logs, backups,
      historical records)

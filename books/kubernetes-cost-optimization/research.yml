common_patterns:
  - name: AI-Powered Resource Right-Sizing
    description: Use AI tools to analyze historical usage patterns and provide precise recommendations for CPU/memory
      requests that balance cost and performance
    typical_savings: 40-60% cost reduction
    implementation_effort: Medium
    risk: Low
    eligibility: Works for any Kubernetes workload with historical usage data
  - name: Cluster Autoscaling Optimization
    description: Configure HPA, VPA, and Cluster Autoscaler to dynamically adjust resources based on actual demand rather
      than static thresholds
    typical_savings: 30-40% in first month
    implementation_effort: Medium
    risk: Medium
    eligibility: Production clusters with variable traffic patterns
  - name: Spot Instance Utilization
    description: Deploy stateless, fault-tolerant workloads on spot/preemptible instances with proper checkpointing and
      handling for interruptions
    typical_savings: 60-70% reduction in compute costs
    implementation_effort: High
    risk: Medium
    eligibility: Batch processing, stateless services, non-critical workloads
  - name: Storage Optimization
    description: Implement lifecycle policies, rightsize PVC claims, remove unattached volumes, and use appropriate storage classes
    typical_savings: 30-50% storage cost reduction
    implementation_effort: Low
    risk: Low
    eligibility: Environments with persistent volumes and data workloads
  - name: Namespace Resource Quotas
    description: Enforce resource quotas and limits per namespace to prevent uncontrolled resource consumption and enforce
      accountability
    typical_savings: 15-25% overall reduction
    implementation_effort: Low
    risk: Low
    eligibility: Multi-team Kubernetes deployments
  - name: ARM-Based Node Migration
    description: Migrate to ARM-based instances (Graviton4, Cobalt, Tau T2A) which offer 30% higher performance at lower cost
    typical_savings: 20-30% compute cost reduction
    implementation_effort: Medium
    risk: Low
    eligibility: Workloads compatible with ARM architecture

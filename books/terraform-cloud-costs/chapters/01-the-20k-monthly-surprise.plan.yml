sections:
  - id: opening
    heading: ""
    word_target: 200
    visual: null
    notes: "Open with industry data hook about Terraform Cloud cost surprises. Use the Odos customer case as lead: migrated
      with 1,500-2,000 resources where TFC would have cost ~$150/month but reached 5x that with concurrency and user
      costs. Establish the chapter premise: IaC cost management is an afterthought until the bill arrives. Cite the
      $21,000/year figure for 18,500 resources. This is NOT a fictional story — use real case study data."
  - id: rum_pricing_foundation
    heading: Understanding Terraform Cloud's Resource Under Management Model
    word_target: 350
    visual: null
    notes: "Explain the RUM pricing model clearly: $0.00014 per managed resource per hour. Walk through the math: 500
      resources costs ~$8.40/month. Clarify what counts as a 'resource' under management — each Terraform resource
      block, data source, and module output that TFC tracks. Explain the 500 free resource offset and how it's applied
      (once per organization, not per workspace). This establishes the foundation for why environment multiplication
      matters."
  - id: multiplication_trap
    heading: The Environment Cloning Cost Multiplier Effect
    word_target: 400
    visual:
      type: d2
      template: before-after-optimization
      purpose: Visualize how resources multiply when cloning prod to staging and dev environments
      style: diagram showing resource count growth from single environment to three environments
    notes: "Core concept: the environment cloning trap. Explain that cloning a 'prod only' environment (~600 resources) to
      staging and development creates ~1,800 total resources — tripling the annual TFC bill because the 500 free
      resource offset only applies once per organization. Use the specific example from research. Explain why teams
      don't anticipate this: they think of environment duplication as 'the same resources' rather than '3x the RUM
      count'. Frame this as a hidden multiplier that catches teams off-guard."
  - id: real_cost_scenarios
    heading: "Real-World Cost Scenarios: From $8 to $1,800/Month"
    word_target: 350
    visual:
      type: table
      purpose: Present concrete cost scenarios with resource counts and monthly prices
      style: "comparison table with three columns: resource count, monthly cost, annual cost"
    notes: "Present a table with calculated scenarios: 500 resources (~$8.40/month), 1,000 resources (~$42/month), 1,800
      resources (~$151/month), 5,000 resources (~$420/month), 18,500 resources (~$1,554/month). Include the Odos case
      study detail: 1,500-2,000 resources where TFC base would be ~$150/month but reached 5x with concurrency and user
      costs. Make this practical — readers should be able to estimate their own exposure."
  - id: cost_optimization_patterns
    heading: Cost Optimization Patterns for IaC Resource Management
    word_target: 500
    visual: null
    notes: "Present the six optimization patterns with specific savings and effort levels: (1) Ephemeral Environments for
      Development: 30-50% reduction in non-production costs, Medium effort. (2) Environment-Specific Resource
      Conditionals: Hundreds of dollars monthly on database and compute in non-prod, Low effort. (3) Reserved Instance
      Automation: Up to 70% vs on-demand pricing, Medium effort. (4) Automated Storage Lifecycle Policies: Over 70% on
      storage through tiering, Low effort. (5) Policy-as-Code Cost Guardrails: Prevents costly mistakes before
      deployment. (6) Infracost PR Integration: 20-30% of IaC changes have cost impact. For each, briefly explain the
      mechanism and why it works with TFC's RUM model."
  - id: conditional_resources_config
    heading: Implementing Environment-Specific Resource Conditionals
    word_target: 300
    visual:
      type: code
      language: hcl
      purpose: Show short HCL example of conditional resource creation based on environment
      style: configuration snippet, 15-25 lines
    notes: "Provide a practical, copy-able HCL configuration showing how to use count or for_each with environment variables
      to conditionally create resources. Example should show a production database instance that doesn't deploy to
      dev/staging, or uses a smaller instance type. Keep it under 25 lines. Explain the RUM impact: this directly
      reduces the resource count in non-production environments. Mention that zopnight can help detect drift on these
      conditional resources."
  - id: summary
    heading: "Key Takeaways: Managing IaC Costs Before They Surprise You"
    word_target: 200
    visual: null
    notes: "Summarize the core insights: (1) Terraform Cloud RUM pricing compounds with environment duplication — the 500
      free offset is a one-time benefit, not per environment. (2) Resource sprawl is the primary cost driver, not
      per-user or concurrency costs. (3) Proactive cost estimation with Infracost and policy-as-code guardrails prevents
      bill shocks. (4) Environment-specific conditionals can reduce non-production RUM by 30-50%. End with a decision
      framework: calculate your current RUM exposure, identify environment duplication opportunities, implement
      conditional resources for non-prod, and add cost estimation to your PR workflow."
content_seeds:
  opening_hook: A customer with 1,500-2,000 Terraform resources expected a $150/month bill from Terraform Cloud. They
    received $750 instead — a 5x multiplier from concurrency and user costs on top of Resource Under Management charges.
    This wasn't a pricing change or a billing error. It was the quiet arithmetic of resource sprawl catching up.
  key_claims:
    - Terraform Cloud RUM pricing at $0.00014/resource/hour means 500 resources costs ~$8.40/month
    - 18,500 resources across 12 workspaces costs ~$1,800/month (~$21,000/year)
    - Cloning a 600-resource prod environment to staging and dev creates 1,800 total resources, tripling the annual bill
      because the 500 free offset applies once per organization
    - 20-30% of all IaC changes have cost impact that goes undetected without pre-deployment estimation
  patterns:
    - "Ephemeral Environments for Development: 30-50% reduction in non-production environment costs, Medium effort"
    - "Environment-Specific Resource Conditionals: Hundreds of dollars monthly on database and compute in non-prod, Low
      effort"
    - "Reserved Instance Automation: Up to 70% vs on-demand pricing savings, Medium effort"
    - "Automated Storage Lifecycle Policies: Over 70% on storage costs through tiering, Low effort"
    - "Policy-as-Code Cost Guardrails: Prevents costly mistakes before deployment, Medium effort"
    - "Infracost PR Integration: 20-30% of IaC changes have cost impact, Low effort"
  configs:
    - type: hcl
      purpose: Conditional resource deployment based on environment
      example_elements:
        - variable 'environment'
        - conditional count or for_each
        - production vs dev instance sizing
  product_tie_in: zopnight provides Terraform state-aware cost analysis, drift detection on resource sizing, and automated
    tagging enforcement across multi-cloud deployments — complementing these patterns by giving visibility into
    cost-impacting resource changes before they reach production.

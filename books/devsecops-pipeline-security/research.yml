common_patterns:
  - name: Shift-Left Security
    description: Integrate security testing early in the SDLC (planning, coding phases) rather than at the end. Catches
      vulnerabilities during initial stages, reducing remediation costs by up to 90% compared to production fixes.
    typical_savings: 60-90% reduction in remediation costs
    implementation_effort: Medium
    risk: Low
    eligibility: All organizations using CI/CD pipelines
  - name: Automated Security Testing in CI/CD
    description: Embed SAST, DAST, SCA, and IaC scanning tools directly into pipeline stages. Run automated scans on every
      commit or pull request to prevent insecure code from progressing.
    typical_savings: 20-40% reduction in security vulnerabilities reaching production
    implementation_effort: Medium
    risk: Low
    eligibility: Teams with established CI/CD workflows
  - name: Policy-as-Code with OPA
    description: Codify security and compliance policies using Open Policy Agent (OPA). Run policies before code reaches CI
      pipeline via IDE integration or pre-commit hooks for early feedback.
    typical_savings: 30-50% faster compliance audits
    implementation_effort: Medium
    risk: Low
    eligibility: Organizations with regulatory compliance requirements
  - name: SBOM Drift Detection
    description: Continuously monitor Software Bill of Materials (SBOM) changes between pre-production and production.
      Detect supply chain attacks and misconfigurations early by tracking component lineage.
    typical_savings: Early detection prevents costly breach remediation
    implementation_effort: High
    risk: Low
    eligibility: Organizations with complex software supply chains
  - name: Secrets Management with Vault
    description: Use HashiCorp Vault or AWS Secrets Manager to securely store and inject credentials at runtime. Never
      hardcode secrets in code or pipeline configs.
    typical_savings: Prevents credential compromise and related breaches
    implementation_effort: Low
    risk: Low
    eligibility: All organizations handling sensitive credentials
  - name: Ephemeral Build Environments
    description: Design CI/CD environments and containers to be short-lived and immutable. Each build runs in a fresh
      environment to eliminate lateral movement opportunities.
    typical_savings: Reduces investigation complexity and security incident impact
    implementation_effort: Medium
    risk: Low
    eligibility: Containerized workloads in CI/CD

      data."
  - id: background
    heading: The Request vs. Actual Usage Gap
    word_target: 200
    visual:
      type: metric-highlight
      metrics_data:
        - label: Requested CPU
          value: 100%
          trend: up
        - label: Actual CPU Used
          value: 13%
          trend: down
        - label: Resources Powering Workloads
          value: 20-45%
          trend: down
      purpose: Visualize the massive inefficiency between what teams request and what workloads actually consume
      style: comparison
    notes: "Explain the fundamental disconnect between requested resources and actual consumption. Use the key statistic:
      only 13% of requested CPU is used on average, while 20–45% of requested resources actually power workloads
      (Sedai). Define 'Request' (what you configure in your Deployment/StatefulSet) vs. 'Actual Usage' (what the
      container actually consumes at runtime). Explain that this gap is the primary driver of waste. Mention that up to
      30% of cloud spending is wasted due to over-provisioned resources (Sedai)."
  - id: config_usage_gap
    heading: "Visualizing the Gap: A Config Comparison"
    word_target: 200
    visual:
      type: comparison-graphic
      comparison_data:
        title: Requested vs. Actual Usage
        before:
          label: Requested (spec.resources)
          value: 4 CPU, 8Gi RAM
        after:
          label: Actual Usage (measured)
          value: 0.5 CPU, 1.2Gi RAM
        improvement: 87.5% over-provisioned — typical for unoptimized deployments
      purpose: Show a before/after config comparison to make the usage gap concrete and actionable
      style: callout
    notes: Provide a concrete code example showing a typical over-provisioned Deployment spec alongside what actual usage
      reveals. Include a short YAML snippet (under 30 lines) showing resources.requests vs. resources.limits with
      commented actual consumption metrics. Explain that most teams copy-paste configs from samples or documentation
      without measuring actual needs. This sets up the next section on the over-provisioning spiral.
  - id: patterns_over_provisioning
    heading: The Over-Provisioning Spiral
    word_target: 250
    visual:
      type: stat-card
      stat_data:
        headline: 30%
        subtext: of cloud spending is wasted due to over-provisioned resources and idle services
        source: Sedai
      purpose: Reinforce the scale of waste with a single impactful metric
      style: callout
    notes: "Explain the self-reinforcing cycle: teams request extra capacity 'just to be safe' → they never measure actual
      usage → the gap grows → costs rise → teams request even more to 'fix' performance issues that don't exist. Name
      this the 'Over-Provisioning Spiral.' Discuss contributing factors: fear of OOM kills, lack of visibility, no
      feedback loop between billing and engineering. Frame this as a cultural problem, not just a technical one.
      Introduce the concept of 'Resource Efficiency Ratio' as a key metric to track."
  - id: decision_framework
    heading: "Cost Attribution Models: Who Pays for What"
    word_target: 200
    visual:
      type: key-number
      stat_data:
        headline: $50K/month
        subtext: typical unmanaged cluster bill that prompts teams to seek optimization
        source: Industry benchmark
      purpose: Ground the discussion in real-world dollar amounts that readers can relate to
      style: callout
    notes: "Explain three cost attribution models: (1) node-level, (2) namespace-level, (3) workload-level. Discuss TCO vs.
      raw compute cost — TCO includes management overhead, idle capacity, and operational burden, not just the compute
      bill. Provide a brief framework for choosing an attribution model based on team structure (FinOps maturity, team
      autonomy vs. accountability). Mention that namespace-level visibility is the recommended starting point for most
      organizations."
  - id: summary
    heading: "Summary: The Path Forward"
    word_target: 150
    visual: null
    notes: "Synthesize the chapter's key takeaways: (1) the Request vs. Actual usage gap is the primary cost leak — 87%
      over-provisioning is common, (2) the Over-Provisioning Spiral compounds without intervention, (3) understanding
      your cost attribution model is essential for accountability. Preview the solutions chapter: VPA for right-sizing
      (20-40% savings), Karpenter for efficient scaling (30-50%), and Spot instances for stateless workloads (60-90%).
      End with a forward-looking statement that controlling Kubernetes costs is a solvable problem with the right
      visibility and automation."
content_seeds:

project:
  type: book
  output-dir: ../../_output/books/gitops-with-argocd
book:
  title: GitOps with ArgoCD
  subtitle: A Practical Guide to GitOps with ArgoCD
  author: Zopdev Team
  date: today
  chapters:
    - index.qmd
    - chapters/01-why-gitops-argocd.qmd
    - chapters/02-argocd-core-concepts.qmd
    - chapters/03-automated-sync-self-heal.qmd
    - chapters/04-multi-cluster-management.qmd
    - chapters/05-applicationsets-scale.qmd
    - chapters/06-app-of-apps-progressive.qmd
    - chapters/07-secrets-production-hardening.qmd
    - chapters/99-closing.qmd
format:
  html:
    theme:
      light:
        - cosmo
        - brand
        - ../../_themes/zopdev-book.scss
      dark:
        - darkly
        - brand
        - ../../_themes/zopdev-book.scss
    grid:
      sidebar-width: 260px
      body-width: 800px
      margin-width: 280px
    toc: true
    toc-depth: 3
    number-sections: true
    code-link: true
    code-copy: true
    code-overflow: wrap
    include-after-body:
      - text: |
          <div class="reading-progress"></div>
          <script>window.addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(h>0)document.querySelector('.reading-progress').style.width=(window.scrollY/h*100)+'%';});</script>
      - file: ../../_themes/lightbox.html
  pdf:
    documentclass: book
    classoption:
      - oneside
      - 11pt
    pdf-engine: xelatex
    include-in-header: ../../_themes/preamble.tex
    toc: true
    number-sections: true
    colorlinks: true
    keep-tex: false
  epub:
    css: ../../_themes/zopdev-epub.css
    toc: true
    number-sections: true

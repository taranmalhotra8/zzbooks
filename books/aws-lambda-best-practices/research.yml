common_patterns:
  - name: Provisioned Concurrency for Cold Start Mitigation
    description: Pre-initialize execution environments to eliminate cold starts for latency-sensitive workloads. Lambda
      keeps functions ready to respond immediately.
    typical_savings: Eliminates 200-2500ms cold start latency depending on runtime
    implementation_effort: Low
    risk: Medium
    eligibility: All Lambda functions; higher cost for always-on capacity
  - name: Memory Right-Sizing with AWS Lambda Power Tuning
    description: Use the open-source Power Tuning tool to find optimal memory configuration that balances cost and
      performance. Memory also controls CPU allocation.
    typical_savings: 20-40% cost reduction through optimal memory settings
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions; automated via CI/CD integration
  - name: Modular SDK Implementation
    description: Use AWS SDK v3 with only specific client modules instead of the full SDK. Replace heavy libraries (e.g.,
      moment.js, TypeORM) with lightweight alternatives.
    typical_savings: ~200KB savings per function by using dayjs instead of moment.js
    implementation_effort: Medium
    risk: Low
    eligibility: All Lambda functions with AWS service dependencies
  - name: Execution Environment Reuse
    description: Initialize SDK clients, database connections, and cache static assets outside the handler function.
      Subsequent invocations reuse these resources.
    typical_savings: Reduces execution time by 50-90% for I/O-bound functions
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions with external dependencies
  - name: Event-Driven Architecture with Dead Letter Queues
    description: Use S3, DynamoDB Streams, EventBridge triggers instead of polling. Configure DLQs to capture failed
      invocations for analysis.
    typical_savings: Eliminates wasted compute from polling patterns
    implementation_effort: Medium
    risk: Low
    eligibility: Async processing, data pipeline, and event-triggered workloads
  - name: Timeout, Retry with Jitter, and Backoff
    description: Configure appropriate timeouts based on load testing. Implement exponential backoff with jitter for retry
      logic to prevent thundering herd.
    typical_savings: Prevents throttling and reduces failed invocation costs
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions calling external services

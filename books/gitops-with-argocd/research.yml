tooling_landscape:
  - name: Argo CD
    category: open-source
    description: CNCF-graduated GitOps continuous delivery tool for Kubernetes; declarative, pull-based synchronization with
      UI and multi-cluster support
  - name: Flux CD
    category: open-source
    description: CNCF-graduated GitOps toolkit with Kubernetes-native, distributed architecture; preferred for high-security
      and edge deployments
  - name: Argo Rollouts
    category: open-source
    description: Progressive delivery controller enabling canary, blue-green, and analysis-based deployments on Kubernetes
  - name: Argo Workflows
    category: open-source
    description: Container-native workflow engine for orchestrating parallel jobs; often used for CI/CD pipelines in GitOps
      workflows
  - name: External Secrets Operator
    category: open-source
    description: Integrates external secret managers (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager) with Kubernetes
  - name: Sealed Secrets
    category: open-source
    description: Kubernetes-wide secret encryption solution allowing safe storage of secrets in Git
  - name: Akuity
    category: commercial
    description: Enterprise GitOps platform built on Argo CD; provides multi-cluster management, governance, and SLA guarantees
  - name: Codefresh
    category: saas
    description: Argo-powered GitOps platform with built-in monitoring, reusable templates, and enhanced visualization
  - name: AWS EKS Capability for ArgoCD
    category: cloud-native
    description: Fully managed ArgoCD (GA November 2025); eliminates operational burden of managing ArgoCD stack on EKS
  - name: GitLab
    category: saas
    description: Integrated DevOps platform with native Flux GitOps extension and comprehensive CI/CD functionality
  - name: Harness

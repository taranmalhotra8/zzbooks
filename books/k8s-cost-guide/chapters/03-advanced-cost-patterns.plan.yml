chapter_id: 03-advanced-cost-patterns
density_level: standard
word_target:
  - 2500
  - 3500
sections:
  - id: opening
    heading: ""
    word_target: 300
    visual: null
    notes: "Open with hard industry data and cost problem framing. Use the Sedai and Arc82 research: 96% enterprises run
      Kubernetes, 30% cloud spending wasted, 88% teams see YoY TCO increases. Calculate the real math: if average
      organization spends $1M/year on K8s, $300K is wasted. Establish this as the 'production problem' - running in
      production is different from development. No fictional characters. Focus on the economic reality that drives the
      need for advanced cost optimization techniques."
  - id: workload_classification
    heading: Workload Tolerance Classification Framework
    word_target: 350
    visual:
      type: table
      template: workload-tolerance-matrix
      purpose: Classify workloads by their spot tolerance and interruption impact
      style: decision-matrix
    notes: "Define the 4-tier classification system: Mission-Critical (0% spot, always-on), Stateful (low spot tolerance,
      needs persistence), Batch/ stateless (high spot tolerance, restartable), and Development/Test (maximum spot
      tolerance). Provide decision criteria for each tier. Include real-world examples: a payment processing pod =
      mission-critical, Redis cache = stateful, daily ETL job = batch, CI/CD runner = dev/test. Reference the 60-90%
      savings potential for workloads that can handle spot. This framework is the prerequisite for all subsequent
      optimization strategies."
  - id: spot_instance_handling
    heading: Spot Instance Interruption Handling
    word_target: 450
    visual:
      type: d2
      template: spot-interruption-workflow
      purpose: Show the spot interruption detection and graceful handling flow
      style: flowchart
    notes: "Cover the technical mechanisms: AWS 2-minute warning via instance metadata, Kubernetes node lifecycle events,
      and pod disruption budgets. Explain the handler architecture: draining strategies, graceful termination,
      checkpointing for stateful workloads. Include a short code/config example showing a daemonset or controller that
      reacts to spot termination notices (under 50 lines). Discuss the difference between application-level handling
      (checkpointing, state replication) vs infrastructure-level handling (pod disruption budgets, PDBs). Mention the
      trade-off: higher savings = more complexity in handling interruptions."
  - id: karpenter_vs_cluster_autoscaler
    heading: "Karpenter vs. Cluster Autoscaler: Decision Framework"
    word_target: 450
    visual:
      type: d2
      template: karpenter-architecture
      purpose: Compare node provisioning approaches between Karpenter and Cluster Autoscaler
      style: architecture-diagram
    notes: "Provide direct comparison: Cluster Autoscaler works with fixed node groups (instance types, AZs defined
      upfront), Karpenter uses provisioners with flexible instance type selection. Key differentiators: consolidation
      (combining smaller pods onto larger instances), expansion (fast node provisioning), bin-packing efficiency.
      Include the 30-50% savings claim with context. Create a decision table: use Cluster Autoscaler if you have strict
      compliance requirements for specific instance types, use Karpenter if you want aggressive cost optimization with
      flexible scaling. Include a short Karpenter Provisioner config example showing spot instance selection,
      consolidation settings, and capacity type preferences."
  - id: node_consolidation
    heading: Node Pool Consolidation Strategies
    word_target: 350
    visual:
      type: table
      purpose: Compare consolidation approaches and their cost impact
      style: comparison
    notes: "Explain consolidation in context of Karpenter: consolidation = finding opportunities to reduce node count by
      bin-packing workloads more efficiently. Cover types: consolidation=auto (Karpenter actively moves pods to reduce
      nodes), consolidation=wait (proactive but waits for optimal opportunities). Discuss when consolidation helps vs.
      hurts: helps when you have variable workloads, can hurt when you have long-running stateful workloads that incur
      data transfer costs. Reference VPA integration - when VPA right-sizes pods, consolidation becomes more effective.
      Mention the 20-40% VPA savings as foundation for consolidation benefits."
  - id: graviton_migration
    heading: "ARM Architecture Migration: The Graviton Advantage"
    word_target: 400
    visual:
      type: callout
      template: benchmark-comparison
      purpose: Present Graviton performance and cost benchmarks
      style: stat-highlight
    notes: "Cover the Graviton business case: 20-40% compute cost reduction, comparable or better performance for most
      workloads. Explain why: custom silicon, efficient ARM instruction set, better price-performance. Address common
      objections: application compatibility (most Go, Java, Python, Node.js apps work without modification), library
      support, ecosystem maturity. Discuss when NOT to migrate: specialized hardware dependencies, x86-specific
      binaries, teams without ARM testing capacity. Reference multi-architecture container support as the enabling
      technology. Include a short Dockerfile example showing multi-arch build with platform flags."
  - id: multi_arch_containers
    heading: Multi-Architecture Container Images
    word_target: 350
    visual:
      type: code
      language: dockerfile
      purpose: Show multi-stage Dockerfile for building ARM and x86 images
      style: minimal
    notes: "Explain the build strategy: manifest lists, buildx for multi-platform builds, registry support for multiple
      architectures. Provide concrete Dockerfile patterns: using --platform flags in FROM, buildx setup for
      cross-compilation. Cover CI/CD integration: how to build both architectures in your pipeline, tag naming
      conventions (latest-amd64, latest-arm64 vs. manifest lists). Discuss image size differences: ARM images often
      smaller due to more efficient instruction set. Include practical tip: start with stateless, embarrassingly
      parallel workloads for Graviton migration, then move to more complex workloads once tooling matures."
  - id: summary
    heading: "Summary: Production Optimization Playbook"
    word_target: 250
    visual:
      type: table
      purpose: Consolidated decision framework and savings summary
      style: action-matrix
    notes: "Synthesize into a decision playbook: Step 1 = classify your workloads (tier system), Step 2 = enable VPA for
      right-sizing foundation, Step 3 = implement spot for batch/dev (65-75% savings), Step 4 = migrate to Karpenter for
      dynamic provisioning (30-50% savings), Step 5 = evaluate Graviton migration (20-40% savings). Reiterate the
      compound effect: these strategies stack. A workload that is batch-tolerant, right-sized via VPA, running on spot
      Graviton instances via Karpenter can achieve 70-80%+ savings vs. on-demand x86. Close with the strategic insight:
      production cost optimization is not about one tool but about systematic application of multiple techniques aligned
      to workload characteristics. No product pitch - focus on the architectural principles and decision frameworks."
content_seeds:
  opening_hook: "96% of enterprises run Kubernetes, yet 88% report year-over-year TCO increases. The math is brutal: 30%
    of cloud spending on Kubernetes is pure waste—$300K of every million dollars spent powers nothing but overhead. This
    chapter is about changing that equation in production."
  key_claims:
    - 30% of Kubernetes cloud spending is wasted due to over-provisioning (Sedai)
    - Only 13% of requested CPU actually powers workloads—87% is unused capacity (Sedai)
    - Spot instances can reduce costs 60-90% on eligible workloads
    - Karpenter reduces node costs 30-50% vs static node groups through intelligent bin-packing
    - Graviton ARM instances deliver 20-40% compute cost reduction with comparable performance
    - VPA-driven right-sizing achieves 20-40% savings and enables more effective spot/consolidation
  patterns:
    - name: Vertical Pod Autoscaling
      savings: 20-40%
      effort: Medium
      role: Foundation for other optimizations - right-sized pods enable better bin-packing and spot placement
    - name: Spot Instance Integration
      savings: 60-90%
      effort: Medium
      role: Maximum savings on batch, stateless, and dev/test workloads via 2-minute interruption handling
    - name: Karpenter Provisioning
      savings: 30-50%
      effort: Medium
      role: Dynamic node provisioning with consolidation, replaces Cluster Autoscaler for most use cases
    - name: Graviton ARM Migration
      savings: 20-40%
      effort: Medium
      role: Modern architecture shift with better price-performance, requires multi-arch containers
    - name: Resource Quotas
      savings: 10-20%
      effort: Low
      role: Prevents runaway workloads and namespace-level cost leakage
    - name: Scheduled Scaling
      savings: 65-75%
      effort: Low
      role: Dev/test environment optimization via cron-based scale-to-zero
  configs:
    - id: karpenter-provisioner-example
      language: yaml
      description: Karpenter Provisioner with spot instances, consolidation, and Graviton support
      lines: 25
    - id: multi-arch-dockerfile
      language: dockerfile
      description: Multi-stage Dockerfile building for both amd64 and arm64
      lines: 20
    - id: spot-termination-handler
      language: go
      description: Simplified spot interruption handler skeleton
      lines: 40
  product_tie_in: "zopnight automates the intersection of these techniques: namespace-level visibility surfaces which
    workloads are candidates for spot, VPA-driven recommendations inform right-sizing decisions, and spot node
    management handles the interruption lifecycle. The framework in this chapter represents what zopnight automates
    across your clusters."

tooling_landscape:
  - name: Kubecost
    category: open-source
    description: Kubernetes-native cost monitoring tool providing namespace-level cost visibility, right-sizing
      recommendations, and allocation reports. Offers 30-50% automated savings through dynamic request sizing.
  - name: CAST AI
    category: commercial
    description: Automation-first platform that automatically right-sizes clusters, optimizes instance selection, and
      manages spot instances. Uses ML to continuously adjust resources with minimal configuration.
  - name: Karpenter
    category: open-source
    description: Open-source Kubernetes node provisioning project that dynamically provisions nodes based on workload
      requirements. Provides 30-40% savings vs traditional node groups.
  - name: nOps
    category: commercial
    description: AWS-focused optimization platform that works with Cluster Autoscaler and Karpenter, tuning scaling in
      real-time and maximizing Reserved Instance utilization.
  - name: ScaleOps
    category: commercial
    description: Comprehensive Kubernetes resource optimization platform with ML-driven right-sizing and automated policy
      enforcement.
  - name: Finout
    category: saas
    description: Enterprise FinOps platform providing unified 'MegaBill' for Kubernetes cost visibility alongside broader
      cloud spend. Excels at multi-cloud allocation and showback.
  - name: OpenCost
    category: open-source
    description: CNCF-backed open-source cost monitoring standard for Kubernetes, providing vendor-neutral cost allocation
      and real-time visibility.
  - name: CloudZero

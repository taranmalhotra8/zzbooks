  - id: dlq_configuration
    heading: Dead Letter Queue Configuration
    word_target: 350
    visual:
      type: comparison-graphic
      purpose: Show the difference between polling waste and event-driven DLQ efficiency
      comparison_data:
        title: Polling vs Event-Driven Processing
        before:
          label: Polling Pattern
          value: Continuous resource consumption
        after:
          label: Event-Driven + DLQ
          value: On-demand, failed events captured
        improvement: Eliminates wasted compute from polling patterns
    notes: "Explain DLQ purpose: capturing failed events for investigation without losing data. Cover DLQ configuration

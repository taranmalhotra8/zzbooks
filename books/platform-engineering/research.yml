common_patterns:
  - name: Self-Service Infrastructure Provisioning
    description: Eliminate TicketOps by enabling developers to provision infrastructure (databases, Kubernetes clusters,
      storage) through the IDP without manual tickets. Pre-configured templates encode organizational standards and
      security policies by default.
    typical_savings: Environment provisioning reduced from days to hours
    implementation_effort: Medium
    risk: Low
    eligibility: All organizations with 50+ engineers facing inconsistent infrastructure
  - name: Golden Path Templates (Blueprints)
    description: Provide templatized, pre-approved infrastructure patterns that embody organizational best practices.
      Developers can bootstrap services in minutes with security, monitoring, and compliance built-in rather than
      configured post-hoc.
    typical_savings: Service setup from weeks to under 10 minutes
    implementation_effort: Medium
    risk: Low
    eligibility: Organizations with multiple teams needing standardized deployment patterns
  - name: Shift-Left Security Guardrails
    description: Embed security policies and compliance checks directly into infrastructure templates and deployment
      pipelines rather than manual gates. Automated policy enforcement (e.g., blocking public S3 access, enforcing
      encryption) happens at provisioning time.
    typical_savings: 75% fewer infrastructure misconfiguration incidents
    implementation_effort: High
    risk: Low
    eligibility: Organizations in regulated industries or with strict compliance requirements
  - name: GitOps-Based Deployment Pipelines
    description: Treat all infrastructure and deployment configurations as code in Git. Use Argo CD or Flux for declarative,
      auditable, automatically-synchronized deployments with drift detection and easy rollbacks.
    typical_savings: Drift detection and remediation reduced to minutes; rollbacks tested and reliable
    implementation_effort: Medium
    risk: Low
    eligibility: Organizations adopting Kubernetes or cloud-native architectures
  - name: Platform-as-a-Product with Developer Experience Focus
    description: Treat the IDP as an internal product with dedicated product management, user research, and continuous
      improvement based on developer feedback. Run discovery sessions, measure adoption, and iterate on pain points.
    typical_savings: 40% higher Developer NPS; reduced unused platform features
    implementation_effort: Medium
    risk: Medium
    eligibility: Organizations with dedicated platform teams (76% have them per DORA)
  - name: Service Catalog with Runtime Visibility
    description: Create a living catalog extending static component inventories with real-time deployment status,
      performance metrics, incident history, and ownership metadata. Enables rapid incident response by showing which
      services are affected.
    typical_savings: MTTR reduced by providing instant context during incidents
    implementation_effort: Medium
    risk: Low
    eligibility: Organizations with 100+ microservices needing ownership clarity

# Chapter Plan — generated by plan-chapters.ts
# Review visual recommendations, then run: make transform ebook=k8s-cost-guide chapter=02-right-sizing-foundations

chapter_id: 02-right-sizing-foundations
density_level: standard
word_target:
  - 2500
  - 3500
sections:
  - id: opening
    heading: ""
    word_target: 350
    visual: null
    notes: "Open with the industry reality from Sedai research: 96% of enterprises run Kubernetes, yet only 13% of requested
      CPU is actually used, while 20-45% of requested resources power workloads. This creates 30% waste. Frame this as a
      systematic problem requiring systematic solution—not blame on teams, but a structural gap in how we configure
      resources. Set up the chapter as a foundation-to-intermediate guide covering measurement, VPA implementation,
      quotas, and scheduled scaling. End the hook by positioning right-sizing as the highest-leverage first step before
      advanced optimizations."
  - id: resource_request_problem
    heading: Why Your Pods Are Over-Provisioned by Default
    word_target: 450
    visual:
      type: callout
      purpose: Illustrate the gap between requested and actual resource usage
      style: comparison
    notes: "Define container CPU/memory requests (what the scheduler uses to place pods) vs limits (hard caps). Explain how
      defaults from Helm charts, sample deployments, and developer intuition create a baseline of over-requestion. Use
      the 13% average CPU utilization stat to show the magnitude. Mention that 88% of teams report YOY TCO increases
      (Arc82) partly due to this drift. Include a short side-by-side: what request means (guaranteed baseline) vs limit
      (ceiling). Keep this conceptual but grounded in numbers."
  - id: measuring_current_state
    heading: "Seeing the Real Picture: p95 vs. Average Usage"
    word_target: 400
    visual:
      type: table
      template: comparison
      purpose: Compare p95 vs average metrics and when each matters
      columns:
        - Metric Type
        - What It Captures
        - Use Case
        - Risk If Ignored
    notes: "Explain why average utilization hides bursty workloads—most apps sit idle then spike (batch jobs, API calls).
      p95 captures the 95th percentile, better representing the ceiling a container needs. Show how to query this from
      kubectl top pods, Prometheus, or cloud dashboards. Include a 2-3 line Prometheus query example for p99 CPU. Make
      the case: right-sizing without p95 is guessing. Position this as the prerequisite step before any VPA or quota
      work."
  - id: vpa_implementation
    heading: "Vertical Pod Autoscaling: Automation That Respects Stability"
    word_target: 500
    visual:
      type: d2
      template: vpa-workflow
      purpose: "Show VPA lifecycle: recommendation → update → observe"
      style: flowchart
    notes: "Explain VPA modes: Off (recommendations only), Initial (on pod creation), Auto (recreate to apply new values),
      and Recreate (experimental—destroys and recreates pods). Include a working VPA config YAML (15-20 lines max)
      showing cpu/memory requests with updateMode and minAllowed/maxAllowed. Address the tradeoff: VPA recommendations
      provide 20-40% savings but require pod restarts in Auto mode. Recommend starting with 'Off' or 'Initial' for
      production stability, then graduating to 'Auto' for non-mission-critical workloads. Mention zopnight's role in
      surfacing these recommendations without manual kubectl grep-ing."
  - id: namespace_quotas
    heading: "Namespace Resource Quotas: Guardrails That Scale"
    word_target: 400
    visual:
      type: code
      language: yaml
      purpose: Show a namespace ResourceQuota and LimitRange configuration
      style: k8s-native
    notes: "Explain ResourceQuota (hard caps per namespace) vs LimitRange (defaults and min/max per pod/container). Include
      a copy-pasteable ResourceQuota YAML showing cpu/memory limits and a LimitRange setting default requests. This
      pattern yields 10-20% savings by preventing runaway workloads (a single misconfigured CronJob can't eat the
      cluster). Explain when to use: team-based namespaces, development vs production isolation, or multi-tenant
      clusters. Emphasize this is a safety net, not a replacement for right-sizing."
  - id: cron_scaling
    heading: "Cron-Based Cluster Scaling: Time-Based Efficiency"
    word_target: 350
    visual:
      type: callout
      purpose: Show example schedule patterns and expected savings
      style: schedule-pattern
    notes: "Explain scheduled (cron-based) scaling for dev/test environments that sit idle nights and weekends. This
      delivers 65-75% savings on eligible workloads. Cover the approach: use CronJobs or cluster autoscaler schedules
      (Karpenter, GKE, AKS) to scale node pools down during off-hours. Mention this is a horizontal strategy (cluster
      level) complementing VPA (pod level). Provide a 2-line cron expression example (e.g., '0 19 * * 1-5' for 7pm
      weekdays). Frame as low-effort, high-return—start here if you have dev/test environments."
  - id: decision_framework
    heading: "Choosing Your Path: A Right-Sizing Decision Framework"
    word_target: 350
    visual:
      type: table
      template: decision-matrix
      purpose: Compare VPA, Quotas, and Cron Scaling across effort/savings/effectiveness
      columns:
        - Approach
        - Savings Range
        - Effort Level
        - Best For
        - Key Consideration
    notes: "Synthesize the three approaches into a decision matrix. VPA: 20-40% savings, medium effort, best for production
      stateless apps—requires pod restarts. Resource Quotas: 10-20% savings, low effort, best for multi-tenant or
      preventing runaway costs—needs namespace strategy. Cron Scaling: 65-75% savings, low effort, best for dev/test and
      batch workloads—requires schedule analysis. Recommend starting with measurement (p95), then apply quotas as
      guardrails, VPA for production tuning, and cron scaling for non-production. This is the practical takeaway
      section."
  - id: summary
    heading: "Summary: From Waste to Efficiency"
    word_target: 200
    visual: null
    notes: "Recap the core message: Kubernetes defaults to over-provisioning, costing enterprises 30% in waste. Right-sizing
      requires three steps: measure with p95, apply VPA for ongoing tuning, and set quotas as guardrails. Add cron
      scaling for dev/test environments for quick wins. Position this as the foundation before advanced optimizations
      (Spot instances, Karpenter, ARM migration). End with a forward-looking note that efficient resources enable faster
      scaling and better performance—not just cost savings."
content_seeds:
  opening_hook: "96% of enterprises run Kubernetes. Only 13% of their requested CPU is actually used. 30% of cloud spend
    is waste. These three statistics from Sedai's 2024 report reveal a structural problem: we've built the most flexible
    infrastructure in history, then asked it to run with the resource assumptions of a 2010 monolith."
  key_claims:
    - Only 13% of requested CPU is used on average while 20-45% of resources power actual workloads
    - 30% of Kubernetes cloud spending is wasted due to over-provisioning
    - VPA implementations yield 20-40% cost reduction with medium implementation effort
    - Resource quotas prevent runaway workloads and yield 10-20% savings
    - Cron-based cluster scaling delivers 65-75% savings on dev/test environments
  patterns:
    vpa_workflow: 20-40% savings, Medium effort, Pod restart required in Auto mode, Start with Off/Initial for production
    resource_quotas: 10-20% savings, Low effort, Needs namespace isolation strategy, Guardrail not replacement for right-sizing
    cron_scaling: 65-75% savings, Low effort, Best for dev/test and batch workloads, Complement to VPA not substitute
  configs:
    vpa_example: YAML showing VerticalPodAutoscaler with updateMode, minAllowed, maxAllowed, target CPU/memory
    quota_example: YAML showing ResourceQuota with requests.cpu, requests.memory, limits.cpu, limits.memory + LimitRange for defaults
    cron_example: Cron expression pattern for weekday evening scale-down (e.g., 0 19 * * 1-5)
  product_tie_in: zopnight automates the measurement phase by surfacing p95 vs average utilization across all namespaces,
    provides VPA-driven right-sizing recommendations without manual kubectl exploration, and visualizes quota
    enforcement—helping teams move from data to action faster.

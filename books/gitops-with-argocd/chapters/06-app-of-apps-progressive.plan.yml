content_seeds:
  opening_hook: "Nearly 60% of Kubernetes clusters managed by survey respondents now rely on Argo CD for application
    delivery (CNCF 2025 End User Survey). But as organizations scale beyond 100 applications, the foundational patterns
    that worked for early adopters break down. This chapter covers the advanced hierarchical patterns that power
    enterprise-grade GitOps: the App of Apps pattern for root Application management and Argo Rollouts for progressive
    delivery with canary analysis and blue-green strategies."
  key_claims:
    - 42% of teams now oversee over 500 applications per Argo CD instance, up from 15% in 2023
    - Argo CD achieved an NPS of 79, with 97% of survey respondents using it in production
    - Deployment frequency should increase by 2x to 5x within three months of GitOps adoption
    - App of Apps pattern simplifies bootstrap processes and enables declarative multi-application orchestration (Low
      effort)
    - Argo Rollouts reduces risk of failed releases and enables safer rollouts with automatic traffic shifting (High
      effort)
  patterns:
    - "App of Apps Pattern: Simplifies bootstrap processes; enables declarative multi-application orchestration"
    - "ApplicationSets for Templated Deployments: Reduces deployment configuration code by 70-80% for
      multi-environment/multi-cluster setups"
    - "Argo Rollouts for Progressive Delivery: Reduces risk of failed releases; enables safer rollouts with automatic
      traffic shifting"
  configs:
    - Root Application YAML managing child Applications via directory or ApplicationSet
    - Analysis template with Prometheus/other metric provider queries for automated verification
    - Blue-green Rollout specification with pre/post promotion analysis and auto-rollback config
    - Canary Rollout specification with traffic splitting and analysis phases
  product_tie_in: This chapter focuses on open-source Argo CD and Argo Rollouts capabilities. The patterns shown work with
    any Argo CD installation - no additional commercial tooling required. However, enterprise teams often combine these
    with Argo CD's built-in RBAC, SSO integration, and audit logging for production governance.

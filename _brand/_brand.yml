# Zopdev Brand Configuration
# Aligned with ZopNight Design System (2026)
# This file is consumed natively by Quarto and read by landing/social generators.
# See: https://quarto.org/docs/authoring/brand.html

color:
  palette:
    cyan: "#0891b2"
    dark-cyan: "#0e7490"
    light-cyan: "#ecfeff"
    navy: "#111827"
    white: "#FFFFFF"
    off-white: "#f9fafb"
    gray-50: "#f9fafb"
    gray-100: "#f3f4f6"
    gray-200: "#e5e7eb"
    gray-300: "#d1d5db"
    gray-400: "#9ca3af"
    gray-500: "#6b7280"
    gray-600: "#4b5563"
    gray-700: "#374151"
    gray-800: "#1f2937"
    gray-900: "#111827"
  foreground: navy
  background: off-white
  primary: cyan
  secondary: gray-500
  link: cyan

typography:
  base:
    family: "Inter"
    weight: 400
    size: 1rem
    line-height: 1.75
  headings:
    family: "Inter"
    weight: 600
    color: navy
    line-height: 1.2
  monospace:
    family: "JetBrains Mono"
    weight: 400
    size: 0.875em
  monospace-inline:
    color: dark-cyan

logo:
  small: logos/zopdev-logo-light.svg
  medium: logos/zopdev-logo-light.svg
  large: logos/zopdev-logo-light.svg

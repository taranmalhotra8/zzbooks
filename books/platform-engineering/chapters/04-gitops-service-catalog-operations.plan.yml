sections:
  - id: opening
    heading: "The Prevention Paradox: Why Incidents Still Happen"
    word_target: 180
    visual: null
    notes: "Open with a compelling data-driven hook about platform engineering adoption. Reference the Gartner prediction
      that 80% of organizations will have platform teams by 2026, and the DORA 2025 finding that teams with IDPs perform
      10% better. Then pivot to the paradox: despite GitOps preventing many issues, incidents still occur in production.
      Introduce the central argument: the solution isn't better prevention alone—it's combining GitOps with runtime

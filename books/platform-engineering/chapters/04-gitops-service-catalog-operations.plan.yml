  - id: gitops_foundations
    heading: GitOps as Your First Line of Defense
    word_target: 200
    visual:
      type: d2
      template: finops-workflow
      purpose: "Show the GitOps reconciliation loop: Git commit → CI pipeline → cluster → continuous reconciliation → drift
        detection"
      style: Process flow showing continuous sync
    notes: "Explain how GitOps with Argo CD or Flux creates a declarative desired state in Git, and the controller
      continuously reconciles actual cluster state against it. Cover the pattern: 'GitOps-Based Deployment Pipelines:
      Drift detection and remediation reduced to minutes; rollbacks tested and reliable' — emphasize that this is MEDIUM
      effort with high payoff. Mention drift detection catches configuration drift automatically, and automated
      remediation (self-healing) is the key benefit. Reference how this prevents configuration drift from accumulating."
  - id: prevention_limits
    heading: "The Limits of Prevention: What GitOps Can't Stop"
    word_target: 200
    visual: null
    notes: "Acknowledge that GitOps excels at preventing configuration drift but cannot prevent runtime failures:
      application bugs, dependency failures, traffic spikes, upstream service outages, data corruption, third-party API
      changes. Explain that runtime state (actual behavior, metrics, logs, traces) exists outside the GitOps
      reconciliation scope. This is where the 'prevention' model breaks down. Use the 'Shift-Left Security Guardrails'
      pattern as a parallel: even with guardrails, 25% of misconfigurations still slip through—so you need runtime
      detection."
  - id: drift_config
    heading: Configuring Drift Detection and Reconciliation
    word_target: 180

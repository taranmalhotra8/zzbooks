  - id: understanding_cold_starts
    heading: Understanding Cold Starts and Their Business Impact
    word_target: 200
    visual: null
    notes: "Define cold start: the initialization delay when Lambda creates a new execution environment. Explain the three
      phases: instance startup (40-60% of delay), runtime initialization (30-40%), and function setup (10-20%). Discuss
      factors affecting cold start duration: runtime (Java/Go vs Node/Python), memory allocation, VPC configuration, and
      dependency loading. Include business impact: user abandonment after 3 seconds, failed transactions, degraded UX
      during traffic spikes. Reference Capital One's case as proof that serverless migration delivers value when
      optimized properly."
  - id: what_is_provisioned_concurrency
    heading: What is Provisioned Concurrency
    word_target: 200
    visual:
      type: comparison-graphic
      template: comparison-graphic
      comparison_data:
        title: On-Demand vs Provisioned Concurrency
        before:
          label: On-Demand Lambda
          value: 200-2500ms cold start per request
        after:
          label: Provisioned Concurrency
          value: ~10ms for initialized functions
        improvement: Eliminates cold start latency entirely
      purpose: Visual contrast between traditional on-demand and provisioned concurrency behavior
    notes: "Explain provisioned concurrency as pre-warmed execution environments that are always ready. Key differentiators:
      you pay for the configured concurrency (per GB-second), not per request. It keeps functions initialized and ready
      to respond in milliseconds. Contrast with on-demand where every request may trigger cold start. Mention that
      provisioned concurrency is tied to a specific function version or alias, enabling controlled rollout. Include the
      key benefit: predictable latency for latency-sensitive workloads."
  - id: configuring_provisioned_concurrency
    heading: Configuring Provisioned Concurrency
    word_target: 250
    visual:
      type: code
      language: bash
      purpose: Show CLI commands for configuring provisioned concurrency
    notes: "This is a CODE/CONFIG section. Walk through configuration via AWS Console, CLI, and SAM/CloudFormation. Include
      code block showing: (1) AWS Lambda console steps, (2) AWS CLI command to set provisioned concurrency on an alias,
      (3) SAM template snippet. Cover key parameters: provisioned concurrency count, scaling configuration. Explain
      auto-scaling vs manual provisioning. Show how to verify provisioned concurrency is active using AWS CLI
      'get-function' command. Include a best practice: always use aliases (e.g., 'prod') for provisioned concurrency to
      enable version control and rollback."
  - id: auto_scaling_provisioned_concurrency
    heading: Auto Scaling for Provisioned Concurrency
    word_target: 250
    visual:
      type: d2
      template: vpa-workflow
      purpose: Show the workflow of how auto scaling responds to traffic patterns for provisioned concurrency
    notes: "This is a D2 DIAGRAM section. Explain AWS Application Auto Scaling integration with Lambda provisioned
      concurrency. Cover: (1) Target tracking: set a target value for concurrent executions, scaling in/out based on
      utilization, (2) Scheduled scaling: pre-warm capacity before known traffic events (Black Friday, product
      launches), (3) Step scaling: respond to CloudWatch alarms with specific scaling actions. Include configuration
      example showing the scaling policy JSON. Discuss the scaling behavior: minimum scale of 1, maximum scale limit (to
      control costs), and the cooldown period. Reference Square Enix handling 30x traffic spikes as real-world
      validation."
  - id: cost_modeling_warm_functions
    heading: Cost Modeling for Warm Functions
    word_target: 300
    visual:
      type: ojs
      template: cost-comparison-calculator
      purpose: Allow readers to model their own cost comparison between on-demand and provisioned concurrency
    notes: "This is the DATA HEAVY section with OJS CALCULATOR. Explain the cost components: (1) On-demand pricing: $0.20
      per 1M requests + $0.0000166667 per GB-second, (2) Provisioned concurrency pricing: $0.0000166667 per GB-second
      (memory) + $0.0000097222 per vCPU-second. Create an interactive calculator where users input: monthly requests,
      average request duration, function memory, expected cold start frequency, and provisioned concurrency level. Show
      output: monthly cost comparison, break-even point, and potential latency savings. Discuss cost optimization
      strategies: right-size concurrency to actual traffic, use auto-scaling to avoid over-provisioning, combine with
      reserved concurrency for baseline capacity."
  - id: alias_routing_strategies
    heading: Alias Routing Strategies
    word_target: 200
    visual:
      type: code
      language: yaml
      purpose: Show SAM template for weighted alias routing with provisioned concurrency
    notes: "This is a second CODE/CONFIG section. Explain weighted alias routing for gradual rollouts and A/B testing.
      Cover: (1) Lambda alias weights: split traffic between versions (e.g., 90% v1, 10% v2), (2) Provisioned
      concurrency on specific versions: apply PC to stable versions only, (3) Traffic shifting patterns: canary
      deployments using CodeDeploy. Include SAM/CloudFormation code showing how to configure weighted aliases with
      provisioned concurrency. Discuss the strategy: apply high provisioned concurrency to the stable version, lower or
      zero to new versions until validated. Mention real-world use case: testing new function code with production
      traffic while maintaining latency guarantees for the majority."

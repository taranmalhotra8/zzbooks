chapter_id: 05-applicationsets-scale
density_level: standard
word_target:
  - 1200
  - 1800
sections:
  - id: opening
    heading: ""
    word_target: 180
    visual:
      type: stat-card
      stat_data:
        headline: 60%
        subtext: of Kubernetes clusters now rely on Argo CD for application delivery
        source: CNCF 2025 End User Survey
      purpose: Hook the reader with a compelling industry statistic showing Argo CD's dominance
    notes: "Open with the 60% adoption stat from CNCF 2025. Mention that 42% of teams now oversee 500+ applications per
      instance (up from 15% in 2023), establishing the scaling challenge. Add the NPS of 79 and 97% production usage to
      build credibility. Transition: While Argo CD handles single application deployment beautifully, managing hundreds
      of applications across multiple clusters becomes unwieldy without abstraction. This chapter introduces
      ApplicationSet—the CRD that lets you deploy hundreds of apps from a single manifest."
  - id: the_scaling_challenge
    heading: The Scaling Challenge in GitOps
    word_target: 200
    visual:
      type: comparison-graphic
      comparison_data:
        title: Application Management Overhead
        before:
          label: Manual Approach
          value: 1 manifest per app × N applications
        after:
          label: ApplicationSet
          value: 1 manifest generates N applications
        improvement: 70-80% reduction in deployment configuration code
      purpose: Visualize the problem/solution contrast for multi-app deployment
    notes: "Define the problem: As organizations scale to hundreds of microservices, creating and maintaining individual
      Application resources becomes tedious and error-prone. Include the pattern about ApplicationSets reducing config
      code by 70-80%. Mention the 'App of Apps' pattern as a precursor but position ApplicationSet as the superior
      approach. Briefly reference multi-cluster management overhead reduction (40-60%) to set context for why teams need
      this."
  - id: applicationset_crd
    heading: Understanding the ApplicationSet CRD
    word_target: 280
    visual:
      type: code
      language: yaml
      template: applicationset-basic
      purpose: Show the fundamental structure of an ApplicationSet
    notes: "Explain that ApplicationSet is a CRD that extends Argo CD's capabilities. It uses generators to produce multiple
      Application resources from a single template. Define the two main components: generators (the input/source) and
      template (the output spec). Show a basic example with a List generator to demonstrate the pattern—include a code
      block showing a simple ApplicationSet with 3 applications (dev, staging, prod). Explain that generators iterate
      over inputs and combine with the template to create Applications. Keep this foundational—readers need to
      understand the generator concept before diving deeper."
  - id: git_generator
    heading: "Git Generator: Directory and File-Based Templating"
    word_target: 350
    visual:
      type: code
      language: yaml
      template: git-generator-example
      purpose: Demonstrate practical Git generator configuration
    notes: "This is the most commonly used generator—explain how it reads from a Git repository to drive deployments. Cover
      two modes: (1) Directory generator—traverses folder structure, one app per directory; (2) File generator—parses
      specific files (JSON/YAML) containing app definitions. Show a real-world example: a repo with /apps/service-a/,
      /apps/service-b/ directories. Include code showing the git generator config with repoURL, revision, and directory
      path. Explain the {{path}} and {{filename}} template variables. Mention practical use case: teams can add a new
      service simply by creating a folder in Git—no manifest changes needed. This connects to the GitOps pattern and
      shows how it enables 2x-5x deployment frequency increase."
  - id: matrix_generator
    heading: "Matrix Generator: Combining Generators"
    word_target: 300
    visual:
      type: d2
      template: matrix-generator-flow
      purpose: Visualize how Matrix combines two generators to create a cartesian product of deployments
    notes: "Matrix generator is powerful—it combines outputs from multiple generators. Explain the concept: if you have 3
      environments (dev, staging, prod) and 4 regions (us-east, us-west, eu, apac), Matrix produces 12 Application
      combinations. Show the D2 diagram illustrating the flow: Generator A (environments) → + Generator B (regions) →
      Matrix → Combined Template. Include a code example showing Matrix generator config with nested generator
      references. Use case: deploying the same application across multiple regions and environments from one
      ApplicationSet. This is where ApplicationSet shines for large-scale deployments."
  - id: cluster_selector
    heading: "Cluster Selector: Dynamic Target Assignment"
    word_target: 220
    visual:
      type: code
      language: yaml
      template: cluster-selector-example
      purpose: Show how to use cluster selectors for dynamic cluster assignment
    notes: "Explain how Cluster selector generator works with Argo CD's cluster credentials. It reads cluster
      metadata/labels and filters which clusters should receive the generated Applications. Show a practical example:
      have clusters labeled with environment=dev, environment=staging, environment=prod—or with team=payments,
      team=orders. Include code showing the cluster generator config with selector matchLabels. Use case: single
      ApplicationSet that dynamically deploys to all clusters matching certain criteria. When new clusters are added
      with matching labels, they're automatically picked up. This enables true 'deploy once, target many' behavior."
  - id: impact_calculator
    heading: Calculate Your ApplicationSet ROI
    word_target: 200
    visual:
      type: ojs
      template: roi-calculator
      purpose: Interactive calculator for readers to estimate time savings and ROI from implementing ApplicationSets
    notes: "Place the interactive calculator here as the data-heavy section. The ROI calculator should let users input:
      current number of applications, number of environments/clusters, estimated hours spent maintaining manifests.
      Output: time saved per month, reduction in config lines, projected annual savings. This makes the chapter
      actionable—readers can quantify the benefit for their specific situation. The calculator demonstrates the 70-80%
      config reduction pattern quantitatively."
  - id: summary
    heading: "Summary: Scaling GitOps with ApplicationSets"
    word_target: 150
    visual:
      type: metric-highlight
      metrics_data:
        - label: Config Reduction
          value: 70-80%
          trend: down
        - label: Deployment Frequency
          value: 2-5x increase
          trend: up
        - label: Operational Overhead
          value: 40-60% reduction
          trend: down
      purpose: Close with key impact metrics in a branded visual
    notes: "Recap the four key concepts: (1) ApplicationSet CRD extends Argo CD for mass deployment, (2) Git generator uses
      repo structure as the source of truth, (3) Matrix generator combines generators for complex scenarios, (4) Cluster
      selector enables dynamic targeting. Emphasize that these work together—use Git generator for structure, Matrix to
      combine with cluster info, Cluster selector to filter targets. Close with forward-looking statement: as teams move
      to 500+ applications, ApplicationSet isn't optional—it's essential. Recommend starting with a single service
      across environments, then expanding."
content_seeds:
  opening_hook: Nearly 60% of Kubernetes clusters managed by survey respondents now rely on Argo CD for application
    delivery. But as organizations scale from tens to hundreds of microservices, the 'one Application per app' model
    breaks down. 42% of teams now oversee over 500 applications per Argo CD instance—up from just 15% in 2023. The pain
    of maintaining hundreds of manifest files is real, and it's slowing down the very deployment velocity that GitOps
    promises to deliver.
  key_claims:
    - ApplicationSet CRD reduces deployment configuration code by 70-80% for multi-environment/multi-cluster setups
    - Git generator uses repository structure (directories/files) as the source of truth for generating Applications
    - Matrix generator combines multiple generators to create cartesian products of deployments
    - Cluster selector dynamically assigns Applications to clusters based on metadata labels
    - Teams can achieve 2x-5x deployment frequency increase within 3 months of GitOps adoption
  patterns:
    - "ApplicationSets for Templated Deployments: Reduces deployment configuration code by 70-80% for
      multi-environment/multi-cluster setups"
    - "Multi-Cluster Management: Reduces operational overhead by 40-60% compared to managing individual cluster
      deployments"
  configs:
    - id: applicationset-basic
      name: Basic ApplicationSet Structure
      description: Minimal ApplicationSet with List generator showing core structure
    - id: git-generator-example
      name: Git Generator Configuration
      description: Complete Git generator example with directory-based app discovery
    - id: matrix-generator-config
      name: Matrix Generator Setup
      description: Matrix generator combining two generators for complex deployment scenarios
    - id: cluster-selector-example
      name: Cluster Selector Usage
      description: Cluster selector matching clusters by labels for dynamic assignment
  product_tie_in: ApplicationSet is a native feature of Argo CD Enterprise and Open Source. The concepts covered (Git
    generator, Matrix, Cluster selector) work in both, though Enterprise adds additional generators (Pull Request,
    Bitbucket) and advanced features like strategic merge patches. This chapter focuses on the Open Source capabilities
    that handle the majority of use cases.

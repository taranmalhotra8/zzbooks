common_patterns:
  - name: Ephemeral Environments for Development
    description: Spin up temporary Terraform environments for PRs, testing, and development that auto-destroy after use,
      preventing idle staging/dev environment costs
    typical_savings: 30-50% reduction in non-production environment costs
    implementation_effort: Medium
    risk: Low
    eligibility: Teams using Git-based workflows with CI/CD pipelines that can trigger terraform destroy
  - name: Environment-Specific Resource Conditionals
    description: Use Terraform count or for_each with environment variables to deploy smaller/cheaper resources (e.g.,
      t3.micro for dev, t3.large for prod) only where needed
    typical_savings: Hundreds of dollars monthly on database and compute in non-prod
    implementation_effort: Low
    risk: Low
    eligibility: Multi-environment deployments (dev/staging/prod) using Terraform variables
  - name: Reserved Instance Automation
    description: Automate purchase of Reserved Instances or Savings Plans for long-running stable workloads like production
      databases and core application servers via Terraform
    typical_savings: Up to 70% vs on-demand pricing
    implementation_effort: Medium
    risk: Low
    eligibility: Predictable, steady-state production workloads running 24/7
  - name: Automated Storage Lifecycle Policies
    description: Configure S3/Blob storage with rules to automatically transition data to Glacier/Archive tiers after 30-90
      days and delete orphaned snapshots
    typical_savings: Over 70% on storage costs through tiering
    implementation_effort: Low
    risk: Medium
    eligibility: Any environment with S3 buckets, EBS volumes, or blob storage
  - name: Policy-as-Code Cost Guardrails
    description: Implement Sentinel or OPA policies to block deployment of expensive instance types and enforce budget
      thresholds in CI/CD before resources are provisioned
    typical_savings: Prevents costly mistakes before deployment; typical savings depend on blocked resources
    implementation_effort: Medium
    risk: Low
    eligibility: Teams with Terraform Cloud Business, Enterprise, or self-hosted policy engines
  - name: Infracost PR Integration
    description: Add cost estimation to pull request workflows showing monthly cost delta before merge, catching expensive
      configurations early
    typical_savings: Prevents budget overruns; 20-30% of IaC changes被发现 to have cost impact
    implementation_effort: Low
    risk: Low
    eligibility: Any team using GitHub/GitLab with CI/CD for Terraform

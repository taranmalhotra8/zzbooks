<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ebook_title}} — Blog | {{company_name}}</title>
  <meta name="description" content="Read all blog posts from {{ebook_title}} by {{company_name}}.">
  <meta name="theme-color" content="#0891b2">
  <meta name="color-scheme" content="light">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      {{#css_vars}}
      {{name}}: {{value}};
      {{/css_vars}}
    }

    /* ── Index-specific overrides ── */
    .index-hero {
      padding: 3rem 0 2rem;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
      border-bottom: 1px solid #e2e8f0;
    }
    .index-hero .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .index-back {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.8125rem;
      color: #64748b;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .index-back:hover { color: #0891b2; }
    .index-series {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0891b2;
      margin-bottom: 0.5rem;
    }
    .index-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .index-subtitle {
      font-size: 1rem;
      color: #64748b;
    }
    .index-grid {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }
    .index-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .index-card:hover {
      border-color: #0891b2;
      box-shadow: 0 4px 16px rgba(8, 145, 178, 0.08);
      transform: translateY(-2px);
    }
    .index-card-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #0891b2, #0e7490);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .index-card-body { flex: 1; min-width: 0; }
    .index-card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .index-card-meta {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .index-footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid #e2e8f0;
      color: #94a3b8;
      font-size: 0.8125rem;
      max-width: 720px;
      margin: 2rem auto 0;
    }
    .index-footer a { color: #0891b2; }
  </style>
</head>
<body>

  <section class="index-hero">
    <div class="container">
      <a href="{{dashboard_url}}" class="index-back">&larr; Back to Dashboard</a>
      <div class="index-series">Blog Series</div>
      <h1 class="index-title">{{ebook_title}}</h1>
      {{#ebook_subtitle}}
      <p class="index-subtitle">{{ebook_subtitle}}</p>
      {{/ebook_subtitle}}
    </div>
  </section>

  <main class="index-grid">
    {{#articles}}
    <a href="{{url}}" class="index-card">
      <div class="index-card-number">{{number}}</div>
      <div class="index-card-body">
        <h2 class="index-card-title">{{title}}</h2>
        <div class="index-card-meta">{{reading_time}} min read &middot; ~{{word_count}} words</div>
      </div>
    </a>
    {{/articles}}
  </main>

  <footer class="index-footer">
    <p>&copy; {{year}} <a href="{{company_website}}">{{company_name}}</a>. All rights reserved.</p>
  </footer>

</body>
</html>

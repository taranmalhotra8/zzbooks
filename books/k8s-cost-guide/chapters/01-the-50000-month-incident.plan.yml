    - 20-45% of requested resources actually power workloads (Sedai)
    - Up to 30% of cloud spending is wasted on over-provisioned resources (Sedai)
    - 88% of teams report year-over-year TCO increases for Kubernetes (Arc82)
  patterns:
    - name: Vertical Pod Autoscaling (VPA)
      savings: 20-40%
      effort: Medium
    - name: Spot Instance Integration
      savings: 60-90%
      effort: Medium
    - name: Cluster Autoscaler with Karpenter
      savings: 30-50%
      effort: Medium
    - name: Resource Quotas and Limits
      savings: 10-20%
      effort: Low
    - name: ARM Migration (Graviton)
      savings: 20-40%
      effort: Medium
    - name: Scheduled Scaling
      savings: 65-75%
      effort: Low
  configs:
    - name: Request vs. Actual Usage
      type: comparison
      purpose: Show typical over-provisioned deployment spec vs. actual measured usage
  product_tie_in: zopnight — Automates Kubernetes cost optimization with namespace-level visibility, VPA-driven
    right-sizing recommendations, and spot node management

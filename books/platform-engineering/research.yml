tooling_landscape:
  - name: Backstage
    category: open-source
    description: Spotify-origin internal developer portal framework providing service catalog, software templates, and
      plugin ecosystem. Most widely-adopted IDP foundation.
  - name: Port
    category: commercial
    description: No-code internal developer portal with flexible software catalogs, scorecards, and self-service actions.
      Rapid implementation with custom data models.
  - name: Cortex
    category: commercial
    description: Internal developer portal focused on engineering excellence with automated service ownership detection via
      ML and scorecard-based governance.
  - name: Humanitec
    category: commercial
    description: Platform orchestrator that standardizes how resources get built and deployed across multiple IaC tools and
      cloud providers.
  - name: Argo CD
    category: open-source
    description: GitOps continuous delivery tool for Kubernetes that provides declarative, automated sync with drift
      detection and rollback capabilities.
  - name: Kubernetes
    category: cloud-native
    description: Container orchestration platform serving as the foundational runtime for cloud-native workloads in most
      platform engineering implementations.
  - name: Terraform/OpenTofu
    category: open-source
    description: Infrastructure as Code tool for provisioning and managing cloud resources. Dominant alongside Kubernetes as
      baseline platform engineering technology.
  - name: Infisical
    category: open-source
    description: Secrets management and identity security platform integrated into developer self-service and deployment workflows.
  - name: OpsLevel
    category: commercial
    description: Service ownership platform with catalog, scorecards, and maturity assessments for microservice organizations.
  - name: Qovery
    category: saas
    description: Simplified platform providing instant production-ready environments on AWS/GCP with CI/CD and cost
      management built-in.
  - name: Crossplane
    category: open-source
    description: Kubernetes-based control plane for provisioning and managing cloud resources and services declaratively.
  - name: OPA Gatekeeper/Kyverno
    category: open-source
    description: Policy-as-code engines for enforcing security, compliance, and organizational standards at infrastructure
      provisioning time.

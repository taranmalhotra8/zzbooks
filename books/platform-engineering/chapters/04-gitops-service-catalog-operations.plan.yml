      type: code
      language: yaml
      purpose: Show Argo CD Application or Flux GitRepository + Kustomization configuration with drift detection settings
      style: Kubernetes YAML configuration
    notes: "Provide concrete configuration examples: Argo CD's 'sync waves', 'health checks', and 'ignoreDifferences' for
      managed fields; Flux's 'Kustomization' with 'prune' and 'dry-run' options. Show how to enable automated
      self-healing (the 'auto-sync' feature in Argo CD). Include comments explaining each option. This is the CODE
      section—writers should provide realistic, production-ready examples that demonstrate the concepts from the
      previous sections."
  - id: runtime_visibility
    heading: "Runtime Visibility: The Missing Half of the Equation"
    word_target: 200
    visual:
      type: d2
      template: data-pipeline
      purpose: Show flow from service catalog → runtime data sources (metrics, logs, traces) → enriched catalog entries →

common_patterns:
  - name: Vertical Pod Autoscaling (VPA)
    description: Analyze actual resource usage and recommend right-sized CPU/memory requests for containers based on
      historical p95 usage patterns
    typical_savings: 20-40% cost reduction
    implementation_effort: Medium
    risk: Low
    eligibility: Workloads with stable, measurable usage patterns; requires VPA admission plugin for automatic updates
  - name: Spot Instance Integration
    description: Run stateless, fault-tolerant workloads on interruptible cloud instances with automatic failover to on-demand nodes
    typical_savings: 60-90% savings on eligible workloads
    implementation_effort: Medium
    risk: Medium
    eligibility: Batch processing, CI/CD pipelines, stateless microservices, development/test environments
  - name: Cluster Autoscaler with Karpenter
    description: Dynamic node provisioning that automatically selects cost-effective instance types based on real-time
      workload requirements
    typical_savings: 30-50% compared to static node groups
    implementation_effort: Medium
    risk: Low
    eligibility: EKS, GKE, AKS clusters with variable workloads; Karpenter requires Kubernetes 1.20+
  - name: Resource Quotas and Limits
    description: Enforce namespace-level resource quotas to prevent teams from over-provisioning and ensure fair allocation
    typical_savings: 10-20% from preventing runaway workloads
    implementation_effort: Low
    risk: Low
    eligibility: Multi-tenant clusters; requires teams to define resource requests for all workloads
  - name: ARM Migration (Graviton)
    description: Migrate x86 workloads to ARM-based instances (AWS Graviton4, Azure Cobalt, GCP Tau) for better price-performance
    typical_savings: 20-40% compute cost reduction
    implementation_effort: Medium
    risk: Low
    eligibility: Applications with multi-arch container images; most Java, Python, Node.js workloads are compatible
  - name: Scheduled Scaling
    description: Automatically scale down non-production environments (dev/staging) during off-hours using cron jobs or
      cluster autoscaler policies
    typical_savings: 65-75% for dev/test environments
    implementation_effort: Low
    risk: Low
    eligibility: Non-production clusters with predictable off-peak periods

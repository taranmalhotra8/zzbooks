    notes: "This is the D2 diagram section. Create a diagram showing: (1) Developer creates PR from golden path template,
      (2) CI pipeline runs policy checks, (3) Approved changes merge to main, (4) GitOps operator (ArgoCD/Flux) syncs to
      cluster, (5) Admission controllers validate at deploy time, (6) Continuous drift detection scans running
      resources. Show feedback loops—policy violations block deployment, drift alerts trigger remediation. Reference the
      pattern: drift detection and remediation reduced to minutes with GitOps. The diagram should make clear that
      security isn't a single gate but continuous enforcement."
  - id: summary
    heading: "Summary: Building Incident Prevention Into Your Platform"
    word_target: 200
    visual: null
    notes: "Synthesize the chapter's key points: Golden path templates prevent misconfiguration by providing pre-approved

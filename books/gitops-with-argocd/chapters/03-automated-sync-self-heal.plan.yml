sections:
  - id: opening
    heading: ""
    word_target: 150
    visual:
      type: stat-card
      template: metric-highlight
      purpose: Establish credibility with industry data on Argo CD adoption
      stat_data:
        headline: 60%
        subtext: of Kubernetes clusters rely on Argo CD for application delivery
        source: CNCF 2025 End User Survey
      metrics_data:
        - label: NPS Score
          value: "79"
          trend: up

        subtext: of enterprises run Kubernetes, but 88% report year-over-year TCO increases
        source: Sedai, Arc82
      purpose: Open with a compelling industry statistic that establishes the universality of the problem and the business
        impact
      style: callout
    notes: "Open with the hook: 96% of enterprises are running Kubernetes (Sedai), yet 88% report year-over-year TCO

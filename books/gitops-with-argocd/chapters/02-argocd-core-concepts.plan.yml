sections:
  - id: opening
    heading: ""
    word_target: 120
    visual:
      type: stat-card
      purpose: Establish ArgoCD's industry dominance and credibility
      stat_data:
        headline: 60%
        subtext: of Kubernetes clusters use ArgoCD for application delivery
        source: CNCF 2025 End User Survey
    notes: "Open with the compelling industry statistic: 60% of Kubernetes clusters now rely on ArgoCD. Mention the
      impressive NPS of 79 and that 97% use it in production. This establishes credibility before diving into hands-on
      content. Brief context: GitOps is becoming the standard for Kubernetes deployment, and ArgoCD is the leading tool
      in this space."
  - id: introduction
    heading: What is ArgoCD and Why It Matters
    word_target: 150
    visual: null
    notes: "Define ArgoCD as a declarative, GitOps continuous delivery tool for Kubernetes. Explain the core concept: Git as
      the single source of truth for application state. Mention that 42% of teams now manage over 500 applications per
      instance. Set expectations for the chapter: you'll build your first ArgoCD Application from scratch, understanding
      the CRD structure, sync process, and health checks."
  - id: application_crd
    heading: "The Application CRD: Your First ArgoCD Resource"
    word_target: 200
    visual:
      type: code
      template: yaml
      language: yaml
      purpose: Show complete Application CRD with all key fields
    notes: "Present a complete, working ArgoCD Application YAML. Include and explain these essential fields: apiVersion
      (argoproj.io/v1alpha1), kind (Application), metadata.name, spec.project (default), spec.source (repoURL, path,
      targetRevision), spec.destination (server, namespace), spec.syncPolicy (automated self-heal explanation). Mention
      that spec.syncPolicy.automated enables the self-heal pattern - one of the key benefits that reduces configuration
      drift to near-zero."
  - id: repository_sources
    heading: "Connecting Your Repository: Git, Helm, and Kustomize"
    word_target: 180
    visual:
      type: code
      template: yaml
      language: yaml
      purpose: Demonstrate three repository source types
    notes: "Show three minimal examples: 1) Git source with path to plain YAML manifests, 2) Helm source with chart name and
      version, 3) Kustomize source with kustomization path. Explain targetRevision (branch, tag, commit SHA). This
      section covers the 'what' goes into spec.source. Keep examples concise - show the key differences in source
      configuration."
  - id: sync_lifecycle
    heading: Understanding the Sync Lifecycle
    word_target: 200
    visual:
      type: d2
      template: vpa-workflow
      purpose: Visualize the sync lifecycle with hooks
    notes: "Explain the sync lifecycle phases in order: PreSync -> Sync -> PostSync. Define what each hook does: PreSync
      (database migrations, pre-deployment checks), Sync (apply resources), PostSync (health checks, notifications).
      Mention that hooks are Kubernetes Jobs or Pods that run to completion. Include the self-heal concept: when cluster
      state diverges from Git, ArgoCD automatically syncs. Reference the pattern: Automated Sync with Self-Heal
      eliminates manual reconciliation."
  - id: health_assessment
    heading: "Health Assessment: Is Your Application Running?"
    word_target: 150
    visual:
      type: comparison-graphic
      purpose: Show application health status comparison
      comparison_data:
        title: Application Health Status
        before:
          label: Missing Health Check
          value: Unknown
        after:
          label: Healthy
          value: Progressing
        improvement: ArgoCD reports actual resource health
    notes: "Explain how ArgoCD assesses health: it checks the status of deployed resources (Deployments, Services, etc.).
      Default health checks work for native Kubernetes resources. Mention Custom Resource Definitions (CRDs) can have
      custom health checks via Lua scripts in spec.health. Briefly mention the 'Progressing' state during deployment.
      This is critical for observability - you always know your app status."
  - id: summary
    heading: "Summary: Your First ArgoCD Application"
    word_target: 100
    visual: null
    notes: "Recap the four core concepts covered: 1) Application CRD structure with required fields, 2) Repository sources
      (Git/Helm/Kustomize), 3) Sync lifecycle with hooks for automation, 4) Health assessment for observability. Mention
      that with these basics, you can deploy any application via GitOps. Preview: next chapter covers ApplicationSets
      and multi-environment deployments."

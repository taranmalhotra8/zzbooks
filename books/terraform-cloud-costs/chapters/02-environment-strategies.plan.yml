sections:
  - id: opening
    heading: ""
    word_target: 350
    visual: null
    notes: "Open with industry data on Terraform Cloud costs, NOT a fictional story. Present the research claims: (1) RUM
      pricing at $0.00014/resource/hour means 500 resources = ~$8.40/month; (2) 18,500 resources across 12 workspaces =
      ~$1,800/month; (3) Cloning prod (600 resources) to staging/dev (1,800 total) more than tripled annual bill due to
      500 free resource offset applying only once; (4) Odos case where TFC would be ~$150/month but reached 5x with
      concurrency costs. Frame the problem: as organizations scale Terraform, costs multiply non-linearly because every
      environment multiplies resource counts. This chapter provides a systematic framework to tame those costs through
      ephemeral environments and policy guardrails."
  - id: cost_driver_analysis
    heading: Understanding Terraform Cost Drivers at Scale
    word_target: 400
    visual:
      type: d2
      template: finops-workflow
      purpose: Visualize how Terraform resources multiply across environments and the cost flow from workspace to cloud bill
      style: minimal
    notes: "Explain the mechanics of why Terraform costs scale. Key points: (1) Terraform Cloud's RUM model charges per
      managed resource regardless of whether it's actively deployed; (2) Non-production environments (dev, staging, QA)
      often run 24/7 but mirror production resources at smaller sizes; (3) The 'free tier' of 500 resources is easily
      exhausted when cloning environments; (4) Concurrency costs and user-based pricing add on top of resource costs.
      Present a framework for categorizing environments: persistent dev, ephemeral dev, staging, UAT, prod. Emphasize
      that non-production environments are where the biggest savings opportunities exist."
  - id: dynamic_resource_config
    heading: Dynamic Resource Configuration with Count and For_each
    word_target: 450
    visual:
      type: code
      language: hcl
      purpose: Show HCL patterns for environment-differentiated resource sizing
      style: minimal
    notes: "This is a CODE section. Demonstrate how to use Terraform's count and for_each with environment variables to
      create cost-differentiated infrastructure. Include: (1) A variable block defining environment tiers with instance
      types; (2) An EC2 instance resource using count to conditionally create based on environment; (3) A for_each
      pattern for environment-specific tags. Keep code under 40 lines total. Example should show how prod uses t3.large
      while dev uses t3.micro, controlled by a single variable. Explain the maintenance benefit: one codebase manages
      all environments, reducing drift and configuration debt."
  - id: ephemeral_environment_automation
    heading: "Ephemeral Environments: Auto-Destroy Workflows for Development"
    word_target: 500
    visual: null
    notes: "Explain the ephemeral environment pattern: development environments that spin up on demand and destroy after
      inactivity. Key points: (1) 30-50% reduction in non-production environment costs (from patterns); (2)
      Implementation approaches: scheduled destruction (nightly/weekly), inactivity-based destruction (CloudWatch events
      triggered by no traffic), PR-close triggers; (3) Trade-offs: cold start time, data persistence challenges, team
      workflow changes. Reference GitOps patterns with tools like Atlantis or Spacelift for ephemeral workspace
      creation. Emphasize this works best for feature branch environments and short-lived dev work."
  - id: environment_tiering
    heading: "Environment Tiering Strategies: Right-Sizing Compute"
    word_target: 400
    visual:
      type: table
      purpose: Compare environment tiers with instance types, costs, and use cases
      style: comparison
    notes: "TABLE section. Present a clear comparison of environment tiers with specific AWS instance types and cost
      implications. Columns: Tier | Instance Type | Monthly Cost (est) | Use Case | Persistence. Rows: Prod, Staging/QA,
      Dev Persistent, Ephemeral/Feature Branch. Include specific savings calculations: e.g., t3.micro ($8.47/mo) vs
      t3.large ($69.72/mo) = $61.25 savings per environment. Mention Reserved Instance automation for production as a
      complement: up to 70% savings (from patterns). Add a column showing Terraform configuration differences needed for
      each tier."
  - id: policy_cost_guardrails
    heading: "Policy-as-Code Guardrails: Preventing Cost Mistakes"
    word_target: 450
    visual:
      type: code
      language: rego
      purpose: Show OPA/Sentinel policy for blocking oversized instances in non-prod
      style: minimal
    notes: "This is a second CODE section. Demonstrate policy-as-code for cost enforcement. Show: (1) An OPA Rego policy
      that prevents deployment of instance types larger than t3.medium in non-production workspaces; (2) Explain how to
      integrate with Terraform Cloud's policy sets or Spacelift's approval workflows; (3) Include a cost-estimation
      threshold policy (block deployments exceeding $X/hour). Explain the 'shift left' benefit: catching expensive
      mistakes before apply, not after. Reference the pattern: Policy-as-Code Cost Guardrails prevents costly mistakes.
      Mention that zopnight provides state-aware analysis that can inform these policies."
  - id: cost_impact_calculator
    heading: Estimating Infrastructure Costs Before Deployment
    word_target: 450
    visual:
      type: ojs
      template: cost-comparison-calculator
      purpose: Interactive calculator for estimating environment cost differences
      style: interactive
    notes: "This is the OJS INTERACTIVE CALCULATOR section. Create a calculator that helps readers estimate their potential
      savings. Inputs: Number of environments, current instance type, proposed instance type, hours running per day,
      monthly hours. Outputs: Monthly cost per environment, total monthly cost, monthly savings, annual savings. Include
      presets for common scenarios: 'Clone prod to staging' (600→1800 resources scenario), 'Ephemeral dev environments'
      (10 feature branches × 50% uptime). Reference the Infracost pattern: 20-30% of IaC changes have cost impact. Make
      it actionable with clear recommendations."
  - id: implementation_roadmap
    heading: "Implementation Roadmap: Where to Start"
    word_target: 350
    visual: null
    notes: "Provide a decision framework for implementing cost controls. Order of operations: (1) Start with environment
      tiering (low effort, immediate savings on compute/database); (2) Add Infracost PR integration to surface cost
      impact before merge (low effort, 20-30% of changes have impact); (3) Implement policy guardrails for non-prod size
      limits (medium effort, prevents drift); (4) Deploy ephemeral environments for development (medium effort, biggest
      savings at 30-50%); (5) Add Reserved Instance automation for production (medium effort, up to 70% savings).
      Include a brief mention of zopnight's role in drift detection on resource sizing and automated tagging
      enforcement—position as complementary to these practices, not the focus."
  - id: summary
    heading: "Summary: Taming Terraform Costs"
    word_target: 250
    visual: null
    notes: "Synthesize the chapter's key insights: (1) Terraform costs multiply with environment count—every non-prod
      environment adds to the RUM bill; (2) Environment-specific conditionals in HCL let you right-size resources
      without code duplication; (3) Ephemeral environments provide 30-50% savings by only existing when needed; (4)
      Policy-as-code prevents expensive mistakes before they happen; (5) Cost estimation tools like Infracost surface
      the financial impact of changes. Emphasize that these techniques work together: tiered environments with policy
      guardrails and cost estimation create a comprehensive cost control system. Close with the business impact: for an
      organization with 1,800 resources across environments, applying these patterns can reduce Terraform infrastructure
      costs by 40-60% while improving governance."
content_seeds:
  opening_hook: "Terraform Cloud's Resource Under Management pricing costs approximately $0.00014 per managed resource per
    hour—meaning 500 resources costs about $8.40 per month. For an organization running 18,500 resources across 12
    workspaces, that's approximately $1,800 monthly, or roughly $21,000 annually. But here's where costs become
    explosive: when a company clones its production environment (~600 resources) to staging and development environments
    (~1,800 total resources), the annual Terraform Cloud bill more than triples because the 500 free resource offset
    only applies once. One customer, Odos, found that Terraform Cloud would have cost $150/month for their 1,500-2,000
    resources, but concurrency and user costs pushed the bill to 5x that amount."
  key_claims:
    - Terraform Cloud RUM pricing at $0.00014/resource/hour means costs scale linearly with resource count across all
      workspaces
    - Cloning environments multiplies costs because the 500-resource free tier applies once, not per environment
    - Ephemeral environments can reduce non-production costs by 30-50%
    - Reserved Instance automation achieves up to 70% savings vs on-demand pricing
    - Policy-as-code guardrails prevent expensive resource configurations before deployment
    - Infracost integration reveals that 20-30% of IaC changes have cost impact
  patterns:
    ephemeral_environments: 30-50% reduction in non-production environment costs, Medium effort
    environment_conditionals: Hundreds of dollars monthly on database and compute in non-prod, Low effort
    reserved_instances: Up to 70% vs on-demand pricing savings, Medium effort
    storage_lifecycle: Over 70% on storage costs through tiering, Low effort
    policy_guardrails: Prevents costly mistakes before deployment, Medium effort
    infracost_pr: 20-30% of IaC changes被发现 to have cost impact, Low effort
  configs:
    - type: hcl
      name: environment-differentiated-ec2
      description: Terraform count/for_each pattern with environment variable for instance sizing
    - type: rego
      name: instance-size-policy
      description: OPA policy to block oversized instances in non-production workspaces
  product_tie_in: zopnight provides Terraform state-aware cost analysis, drift detection on resource sizing, and automated
    tagging enforcement across multi-cloud deployments. Position zopnight as complementary to the chapter's
    techniques—useful for ongoing governance after initial implementation, not as the primary solution.

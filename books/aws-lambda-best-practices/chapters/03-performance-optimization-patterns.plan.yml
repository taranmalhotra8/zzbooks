sections:
  - id: opening
    heading: ""
    word_target: 180
    visual:
      type: stat-card
      stat_data:
        headline: 1.5M+
        subtext: monthly active customers using AWS Lambda
        source: AWS Compute Blog
      purpose: Open with compelling industry scale to establish relevance
    notes: "Opening hook using AWS Lambda market data. Start with the 1.5 million monthly active customers stat from AWS
      Compute Blog. Then pivot to the reality that most Lambda functions are not optimized — they run with default 128MB
      or arbitrary memory settings, leaving significant cost savings on the table. Introduce the chapter's focus: three
      proven techniques that can reduce Lambda costs by 20-40% while improving performance. Mention that this chapter
      covers memory right-sizing, SDK optimization, and handler initialization patterns."
  - id: memory_cpu_relationship
    heading: Understanding Memory-CPU Relationship in Lambda
    word_target: 220
    visual:
      type: d2
      template: vpa-workflow
      purpose: Show the memory-CPU allocation relationship and how it affects billing
    notes: "Explain that Lambda memory and CPU are directly linked — you cannot increase CPU without increasing memory.
      Every 176MB increment provides additional CPU power. Key insight: paying for more memory often costs less because
      execution time decreases proportionally. Discuss the billing model: GB-seconds, not just execution time. Include
      the formula: cost = (memoryMB / 1024) × executionTimeSeconds × invocations × pricePerGBSecond. This section
      establishes the mathematical foundation for why memory optimization matters."
  - id: power_tuning_implementation
    heading: AWS Lambda Power Tuning Implementation
    word_target: 250
    visual:
      type: code
      language: yaml
      purpose: Show Step Functions state machine for Power Tuning
    notes: "This section provides the implementation for AWS Lambda Power Tuning (an AWS SAM template or Terraform config).
      Include the Step Functions state machine that tests Lambda at different memory settings (128MB to 10GB in
      increments). Explain how the state machine invokes the target function at each memory tier, measures cost and
      performance, and returns the optimal configuration. Mention the trade-offs: faster execution vs. higher
      per-invocation cost. Reference the pattern: 'Memory Right-Sizing with AWS Lambda Power Tuning' for 20-40% cost
      reduction."
  - id: sdk_v3_modular_imports
    heading: AWS SDK v3 Modular Imports
    word_target: 220
    visual:
      type: code
      language: javascript
      purpose: Compare SDK v2 full import vs. SDK v3 modular imports
    notes: "Demonstrate the problem with AWS SDK v2: importing the full SDK adds ~20MB to deployment package. Show the SDK
      v3 modular approach: import only the specific client needed (e.g., '@aws-sdk/client-s3' instead of 'aws-sdk').
      Include code comparison: before (full import) vs. after (modular). Mention third-party library alternatives: use
      dayjs instead of moment.js (~200KB savings), use lodash-es for tree-shaking. Reference the pattern: 'Modular SDK
      Implementation' for ~200KB savings per function."
  - id: handler_initialization
    heading: Handler外 Initialization Pattern
    word_target: 200
    visual:
      type: comparison-graphic
      comparison_data:
        title: Initialization Location Impact
        before:
          label: Handler内 (inside function)
          value: Runs every invocation
        after:
          label: Handler外 (module scope)
          value: Runs once per container
        improvement: 50-90% faster for I/O-bound functions
      purpose: Show performance difference between handler内 and handler外 initialization
    notes: Explain the Handler外 (handler outside) initialization pattern — placing expensive operations (database
      connections, SDK clients, config loading) at module scope, not inside the handler function. This code runs once
      when the execution environment initializes, not on every invocation. Include a code example showing config
      loading, DB pool creation, and SDK client instantiation outside the handler. Reference the 'Execution Environment
      Reuse' pattern for 50-90% reduction in execution time for I/O-bound functions.
  - id: connection_pooling
    heading: Connection Pooling Outside Handler
    word_target: 180
    visual:
      type: key-number
      stat_data:
        headline: 90%
        subtext: cost savings achieved by Capital One with Lambda migration
        source: AWS Case Studies
      purpose: Highlight real-world impact of Lambda optimization
    notes: "Expand on environment reuse to cover connection pooling specifically. Database connections, HTTP agents, and
      Redis clients should be created at module scope and reused across invocations. Explain the lifecycle: Lambda
      reuses the execution environment for hours, so connections persist. Include code for creating a connection pool
      (e.g., pg pool, DynamoDB document client) outside the handler. Warn about connection exhaustion if pools are
      created inside the handler. Mention the case study: Capital One achieved up to 90% cost savings."
  - id: roi_calculator
    heading: Calculate Your Optimization Potential
    word_target: 150
    visual:
      type: ojs
      template: cost-comparison-calculator
      purpose: Interactive calculator for readers to model their own Lambda cost scenarios
    notes: "This is the required interactive OJS section. Use the cost-comparison-calculator template to let readers input:
      current memory allocation, monthly invocations, average execution duration, and AWS region. The calculator should
      show: current monthly cost, estimated optimal memory setting, projected cost after optimization, and monthly
      savings. Make it actionable so readers can immediately apply the chapter's concepts to their own workloads."
  - id: summary
    heading: "Summary: Three Techniques, Significant Savings"
    word_target: 180
    visual:
      type: metric-highlight
      metrics_data:
        - label: Memory Optimization
          value: 20-40% cost reduction
          trend: down
        - label: SDK Modularization
          value: ~200KB package savings
          trend: down
        - label: Environment Reuse
          value: 50-90% faster I/O
          trend: up
      purpose: Recap the three key techniques with quantified impact
    notes: "Summarize the three core techniques: (1) Memory right-sizing via Power Tuning for 20-40% cost reduction, (2) SDK
      v3 modular imports for smaller packages and faster cold starts, (3) Handler外 initialization and connection pooling
      for 50-90% faster I/O-bound operations. Reinforce that these are low-to-medium effort changes with immediate
      returns. Close with guidance: start with Power Tuning to find optimal memory, then refactor SDK imports, then move
      expensive operations outside the handler. Mention that Provisioned Concurrency can further eliminate cold starts
      for latency-sensitive workloads."
content_seeds:
  opening_hook: AWS Lambda processes over 1.5 million monthly active customers with tens of trillions of invocations, yet
    the majority of these functions run with default or arbitrary memory settings that leave significant cost savings
    unclaimed.
  key_claims:
    - Memory and CPU are directly linked in Lambda — every 176MB increment adds more CPU power
    - AWS Lambda Power Tuning can reduce costs by 20-40% through optimal memory settings
    - AWS SDK v3 modular imports save ~200KB per function compared to full SDK
    - Handler外 initialization reduces execution time by 50-90% for I/O-bound functions
    - Execution environment reuse persists connections across invocations for hours
  patterns:
    - Provisioned Concurrency for Cold Start Mitigation
    - Memory Right-Sizing with AWS Lambda Power Tuning
    - Modular SDK Implementation
    - Execution Environment Reuse
    - Event-Driven Architecture with Dead Letter Queues
    - Timeout, Retry with Jitter, and Backoff
  configs:
    - name: Lambda Power Tuning State Machine
      type: yaml
      purpose: Step Functions workflow for testing Lambda at different memory tiers
    - name: SDK v3 Client Initialization
      type: javascript
      purpose: Modular import pattern for AWS SDK v3
  product_tie_in: AWS Lambda Power Tuning (open-source), AWS SDK v3, AWS Step Functions, Amazon DynamoDB Document Client

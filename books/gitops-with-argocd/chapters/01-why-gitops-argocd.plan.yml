    heading: ""
    word_target: 150
    visual:
      type: stat-card
      purpose: Hook readers with compelling industry adoption data showing ArgoCD's dominance in Kubernetes delivery
      stat_data:
        headline: 60%
        subtext: of Kubernetes clusters use Argo CD for application delivery (CNCF 2025)
        source: CNCF End User Survey 2025
    notes: "Open with the striking CNCF 2025 statistic that 60% of Kubernetes clusters rely on ArgoCD. Add secondary stats:
      NPS of 79, 97% production usage. Frame this as: the industry has spoken, and GitOps with ArgoCD is the clear
      standard. Set up the question: Why has ArgoCD become the default choice?"
  - id: gitops_principles
    heading: "GitOps: The Operating Model for Cloud-Native Delivery"
    word_target: 200
    visual:
      type: d2
      template: vpa-workflow
      purpose: Visualize the Pull-based GitOps workflow showing Git as the single source of truth
    notes: "Explain the three foundational principles of GitOps: (1) Declarative - you define desired state, not steps; (2)
      Versioned - Git holds the canonical configuration, enabling audit trails and rollbacks; (3) Pull-based - the
      controller pulls changes from Git rather than having code push to clusters (this is key for security). Contrast
      with traditional push-based CD. Mention that GitOps transforms Git into the control plane for your
      infrastructure."
  - id: argocd_architecture
    heading: "ArgoCD Architecture: How It Works Under the Hood"
    word_target: 200
    visual: null
    notes: "Cover the three main components: (1) Application CRD - the Kubernetes custom resource that defines what to
      deploy, where, and how; (2) Controller - the reconciliation loop that continuously monitors Git and cluster state,
      triggering syncs when drift is detected; (3) API Server - the UI and CLI interface for managing applications.
      Explain that ArgoCD treats Git as the source of truth and constantly works to align cluster state with Git state.
      This architecture is what enables self-healing."
  - id: drift_detection
    heading: "Drift Detection: Your Safety Net Against Configuration Drift"
    word_target: 150
    visual: null
    notes: "Explain what drift is: when cluster state diverges from Git state (can happen via manual kubectl edits, failed
      deployments, or cluster issues). Describe how ArgoCD continuously compares desired state (from Git) vs actual
      state (in cluster). When drift is detected, ArgoCD can auto-sync (self-heal) or alert. This eliminates the '
      configuration drift' problem that plagues traditional deployments. Mention this is the key value proposition -
      your cluster always matches your Git repo."
  - id: application_crd_config
    heading: Your First ArgoCD Application
    word_target: 150
    visual:
      type: code
      language: yaml
      purpose: Show a concrete ArgoCD Application resource to make the architecture concrete
    notes: "Provide a complete, commented YAML example of an ArgoCD Application CRD. Include: apiVersion, kind: Application,
      metadata, spec (source repo, target revision, path, destination server/namespace). Show how declarative this is -
      one YAML file defines the entire application deployment. Explain each field briefly. This grounds the architecture
      discussion in real config."
  - id: applicationset_config
    heading: Scaling with ApplicationSets
    word_target: 150
    visual:
      type: code
      language: yaml
      purpose: Demonstrate how ApplicationSets enable template-based multi-environment deployments
    notes: "Show an ApplicationSet example using generators (e.g., matrix or git generator) to deploy to multiple
      environments from a single template. This addresses the pattern 'ApplicationSets for Templated Deployments' -
      70-80% reduction in deployment config code. Explain the use case: dev/staging/prod, or multi-cluster. This shows
      how ArgoCD scales beyond single app deployment."
  - id: summary
    heading: "Summary: The GitOps Imperative"
    word_target: 100
    visual: null
    notes: "Wrap up: GitOps with ArgoCD provides (1) single source of truth via Git, (2) drift detection and self-healing,
      (3) scalable patterns for multi-cluster/multi-env. With 60% adoption and 97% production usage, the industry has
      validated this approach. Next steps: set up your first ArgoCD instance, convert one app to GitOps, experience the
      safety net of drift detection."
content_seeds:
  opening_hook: 60% of Kubernetes clusters now rely on ArgoCD for application delivery. That's not a trend—it's a tidal
    shift. The CNCF 2025 End User Survey reveals that ArgoCD has achieved an NPS of 79 with 97% of users running it in
    production. But what's driving this dominance? The answer lies in GitOps—the operating model that treats Git as the
    single source of truth for your entire infrastructure.
  key_claims:
    - GitOps with ArgoCD has become the dominant delivery pattern for Kubernetes (60% adoption)
    - The three pillars—declarative, versioned, Pull-based—transform how teams manage infrastructure
    - ArgoCD's continuous reconciliation eliminates configuration drift automatically
    - ApplicationSets and App of Apps patterns enable enterprise-scale deployments
  patterns:
    - name: Automated Sync with Self-Heal
      description: ArgoCD continuously monitors Git and cluster state, auto-syncing when drift is detected
      effort: Low
    - name: Multi-Cluster Management
      description: Manage multiple clusters from single ArgoCD instance, reducing operational overhead 40-60%
      effort: Medium
    - name: ApplicationSets for Templated Deployments
      description: Template-based deployments reduce config code 70-80% for multi-environment setups
      effort: Medium
  configs:
    - type: Application CRD
      description: The core Kubernetes resource that defines what to deploy, from where, to which cluster
    - type: ApplicationSet
      description: Generates multiple Application resources from templates using generators
  product_tie_in: ArgoCD is the CNCF-graduated project that embodies GitOps principles. As you implement these patterns,
    ArgoCD provides the controller, API server, and UI to manage the entire lifecycle. Start with one Application CRD,
    then scale with ApplicationSets.

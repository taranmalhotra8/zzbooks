# Context file for: {{book_title}}
# Generated by: create-ebook CLI
# Purpose: Provides product-specific context that the LLM can't research.

product_relevance:
  product_id: "{{product_id}}"
  product_name: "{{product_name}}"
  connection: "{{product_connection}}"
  features_to_highlight:
{{#product_features}}
    - "{{.}}"
{{/product_features}}

editorial_direction:
  tone: "practical, authoritative, data-driven"
  audience: "{{audience}}"
  angle: "{{angle}}"
  avoid:
    - "Generic advice without specific examples"
    - "Marketing language or product promotion"
    - "Claims without supporting data"
  emphasize:
    - "Real-world metrics and dollar amounts"
    - "Production-ready code and configurations"
    - "Actionable implementation steps"

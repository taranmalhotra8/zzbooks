      Transition to thesis: Platform teams are solving this by building golden paths and embedding security guardrails
      directly into developer workflows, stopping incidents before they ever reach production."
  - id: platform_engineering_context
    heading: The Platform Engineering Foundation
    word_target: 250
    visual: null
    notes: Contextualize golden paths within platform engineering movement. Reference the DORA 2025 finding that teams with
      internal developer platforms perform 10% better. Explain the relationship between platform teams, developer
      experience, and operational outcomes. Mention the 40-50% cognitive load reduction that high-maturity platform
      teams report. Establish that golden paths are a core component of internal developer platforms—they're not
      optional enhancements but foundational infrastructure that enables self-service.
  - id: golden_path_templates
    heading: "Golden Path Templates: Blueprints That Prevent Misconfiguration"
    word_target: 250
    visual: null
    notes: "Define golden path templates as pre-approved, infrastructure-as-code blueprints that encode organizational best
      practices, security requirements, and operational standards. Explain how they work: developers instantiate a
      template rather than building from scratch, automatically inheriting correct configurations. Use the pattern data:
      service setup reduced from weeks to under 10 minutes. Discuss what makes a good golden path—must include: approved
      base images, configured monitoring/alerting, network policies, secrets management, and security scanning. Mention
      that golden paths evolve based on incident postmortems and security learnings."
  - id: shift_left_security_guardrails
    heading: "Shift-Left Security: Guardrails That Block Threats Before Production"
    word_target: 250
    visual: null
    notes: "Explain shift-left security as moving security checks earlier in the development lifecycle. Guardrails are
      automated enforcement points that prevent insecure or non-compliant configurations from progressing. Reference the
      pattern: 75% fewer infrastructure misconfiguration incidents with shift-left security. Differentiate guardrails
      from gates: guardrails are proactive constraints (you can't do X), gates are checkpoints (you can proceed if Y
      passes). Discuss the psychological benefit: developers don't have to remember every security requirement—they're
      protected by the platform. Examples: blocking deployment of images with critical CVEs, preventing exposure of
      sensitive environment variables, enforcing encryption at rest."
  - id: policy_as_code_config
    heading: "Policy-as-Code: Expressing Guardrails in Code"
    word_target: 200
    visual:
      type: code
      language: yaml
      purpose: Show example OPA/Gatekeeper policy that enforces security guardrails
      template: null
      style: opa-policy
    notes: "This is the code/config section. Show a practical example of policy-as-code using OPA (Open Policy Agent) or
      Gatekeeper. Include a policy that: (1) requires all Kubernetes deployments to have securityContext defined, (2)
      blocks images from untrusted registries, (3) enforces resource limits. Explain how this policy runs in the CI
      pipeline and/or admission controller. Emphasize that policies are version-controlled, reviewed via PR, and provide
      clear error messages when violations occur. This makes security requirements explicit, auditable, and
      developer-friendly."
  - id: gitops_pipeline_diagram
    heading: "GitOps Pipeline: Where Golden Paths Meet Deployment"
    word_target: 200
    visual:
      type: d2
      template: finops-workflow
      purpose: Visualize the GitOps pipeline with golden path instantiation, policy enforcement gates, and drift detection

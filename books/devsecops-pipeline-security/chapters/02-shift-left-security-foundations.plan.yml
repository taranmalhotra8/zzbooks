  - id: shift_left_defined
    heading: What Is Shift-Left Security?
    word_target: 160
    visual: null
    notes: "Define shift-left security as the practice of moving security earlier in the software development lifecycle—from
      production debugging to design and coding phases. Explain the traditional model (security as a gatekeeper at the
      end) versus shift-left (security woven throughout). Use the remediation cost analogy: catching a vulnerability in
      design costs ~$0, in coding ~$100, in staging ~$1,000, in production ~$10,000+. Reference the 60-90% cost
      reduction pattern from the research. Keep it conceptual—this is a foundation chapter for beginners. Emphasize this
      isn't about replacing security teams but empowering developers to own security from the start."
  - id: threat_modeling_design
    heading: Threat Modeling in the Design Phase
    word_target: 160
    visual:
      type: key-number
      purpose: Highlight the cost of late-stage remediation to emphasize why design-phase threat modeling matters
      stat_data:
        headline: 10x
        subtext: Cost multiplier for fixing vulnerabilities in production vs. design
        source: Industry research consensus
    notes: "Explain threat modeling as a structured approach to identifying, quantifying, and addressing security risks
      during system design. Introduce STRIDE or similar lightweight frameworks at a high level (don't overwhelm
      beginners with methodology depth). Discuss what to model: data flows, trust boundaries, authentication points,
      data storage. Emphasize this should be a collaborative exercise with developers, architects, and security pros—not
      a solo security team activity. Mention it takes 1-2 hours per feature/module and prevents days of rework later.
      Briefly note the pattern: early detection prevents costly breach remediation."
  - id: ide_security_scanning
    heading: IDE-Integrated Security Scanning
    word_target: 150
    visual:
      type: comparison-graphic
      purpose: Show the improvement from catching issues in the IDE vs. waiting for CI/CD
      comparison_data:
        title: Vulnerability Detection Timing
        before:
          label: Traditional (CI/CD-only)
          value: Pipeline failure, context lost
        after:
          label: IDE-integrated scanning
          value: Real-time feedback, fix in seconds
        improvement: Faster feedback loop, higher fix rates
    notes: "This is a code/config section. Explain IDE-integrated scanning tools (Snyk, Checkmarx, SonarQube LSP, GitHub
      Copilot Security). Describe how they analyze code as developers type, providing inline annotations for
      vulnerabilities, outdated dependencies, and insecure patterns. Include a concrete example: scanning for SQL
      injection risk or hardcoded API keys. Provide a minimal configuration example in YAML or JSON format showing how
      to enable a scanner in a project (e.g., a .snyk or sonar-project.properties snippet). Emphasize the developer
      experience benefit: security becomes helpful, not a blocker."
  - id: pre_commit_hooks
    heading: Pre-Commit and Pre-Receive Security Hooks
    word_target: 150
    visual: null
    notes: "This is a code/config section. Explain Git hooks as automated guards that run before code enters the repository.
      Cover pre-commit hooks (local, run before git commit) for linting, secret scanning, and basic SAST. Cover
      pre-receive hooks (server-side, at git push) for policy enforcement. Provide a practical example: a pre-commit
      hook that runs detect-secrets or gitleaks to catch API keys before they're committed. Show a simple shell script
      example for a pre-commit hook. Discuss the balance: hooks should be fast (<30 seconds) to avoid developer
      frustration. Reference the pattern: automated security testing in CI/CD reduces vulnerabilities reaching
      production by 20-40%."
  - id: business_roi
    heading: The Business Case for Shift-Left
    word_target: 140
    visual:
      type: metric-highlight
      purpose: Summarize the ROI patterns for leadership buy-in
      metrics_data:
        - label: Remediation cost reduction
          value: 60-90%
          trend: down
        - label: Vulnerabilities in production
          value: 20-40% fewer
          trend: down
        - label: Compliance audit speed
          value: 30-50% faster
          trend: up
    notes: "Synthesize the patterns into a business narrative. Use the Datadog finding (87% of organizations have known
      exploitable vulnerabilities) as a call to action. Explain that shift-left directly addresses this by catching
      issues before deployment. Connect each pattern to business value: Shift-Left Security saves money, Automated
      Testing improves quality, Policy-as-Code accelerates audits, SBOM Drift Detection prevents breaches. Frame this as
      an investment with clear returns. Briefly mention that developer onboarding takes time but pays dividends in
      reduced incident response burden."
  - id: summary
    heading: "Summary: Start Shifting"
    word_target: 90
    visual: null
    notes: "Restate the core thesis: security earlier in the development lifecycle is cheaper, faster, and more effective.
      Recap the four key practices covered: threat modeling in design, IDE-integrated scanning, pre-commit/pre-receive
      hooks, and the business case for ROI. Close with an actionable next step: pick ONE practice to implement this
      week—start small, measure impact, expand. Emphasize that shift-left is a journey, not a destination, and the
      beginner foundation built here enables more advanced practices later."
content_seeds:
  opening_hook: "The DevSecOps market is projected to grow from $5.9 billion to $24.2 billion by 2032—a 19.4% compound
    annual growth rate that reflects one uncomfortable truth: security in software development is no longer optional.
    Yet here's the paradox: 97% of commercial codebases contain open-source components, and 81% of those harbor at least
    one high- or critical-risk vulnerability. Meanwhile, 80% of application dependencies remain un-updated for over a
    year, and 87% of organizations have at least one known exploitable vulnerability in deployed services. The cost of
    catching vulnerabilities late is spiraling—but it doesn't have to be this way."
  key_claims:
    - Shift-left security moves vulnerability detection from production to design/coding phases
    - Threat modeling during system design prevents costly rework later
    - IDE-integrated scanning provides real-time, context-aware security feedback
    - Git hooks automate security checks before code enters the repository
    - Early detection reduces remediation costs by 60-90%
  patterns:

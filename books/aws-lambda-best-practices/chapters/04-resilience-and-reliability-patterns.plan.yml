  - id: retry_strategies
    heading: Exponential Backoff with Jitter
    word_target: 400
    visual:
      type: code
      language: javascript
      purpose: Show implementation of exponential backoff with jitter
      template: code
    notes: "Explain why simple retries cause thundering herd problems. Cover exponential backoff: doubling wait time (1s,
      2s, 4s, 8s...). Add jitter (randomization) to prevent synchronized retries. Include full code example implementing
      'decorrelated jitter' algorithm (AWS recommended). Show configuration options for Lambda retry behavior (max retry
      attempts, max event age). Mention the 'timeout, retry with jitter and backoff' pattern. Include an interactive OJS

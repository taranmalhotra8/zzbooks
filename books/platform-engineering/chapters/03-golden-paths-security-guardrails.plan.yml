content_seeds:
  opening_hook: By 2026, 80% of software engineering organizations will have platform teams—and they're not building them
    for fun. They're building them because every delayed deployment, every security incident, and every misconfigured
    environment is a tax on innovation. The organizations that have already adopted platform engineering (55% in 2025)
    are reporting 40-50% reductions in cognitive load for developers, while DORA's 2025 research shows internal
    developer platforms deliver 10% performance improvements. The secret? Golden paths and shift-left security
    guardrails that stop incidents before deployment.
  key_claims:
    - Golden path templates reduce service setup from weeks to under 10 minutes
    - Shift-left security guardrails prevent 75% of infrastructure misconfiguration incidents
    - Policy-as-code makes security requirements explicit, auditable, and developer-friendly
    - GitOps pipelines provide continuous enforcement with drift detection in minutes
    - Platform teams using golden paths see measurable improvements in developer experience and security posture
  patterns:
    - "Golden Path Templates (Blueprints): Service setup from weeks to under 10 minutes savings, Medium effort"
    - "Shift-Left Security Guardrails: 75% fewer infrastructure misconfiguration incidents savings, High effort"
    - "GitOps-Based Deployment Pipelines: Drift detection and remediation reduced to minutes; rollbacks tested and
      reliable savings, Medium effort"
  configs:
    - OPA/Gatekeeper policy requiring securityContext in Kubernetes deployments
    - OPA policy blocking images from untrusted registries
    - OPA policy enforcing resource limits on all containers
  product_tie_in: This chapter positions golden paths and guardrails as the foundation of an internal developer platform.
    While the principles apply broadly, teams implementing these patterns typically use platform engineering tools
    (Backstage, Port) for the developer portal, GitOps operators (ArgoCD, Flux) for deployment, and policy engines
    (OPA/Gatekeeper, Kyverno) for enforcement.

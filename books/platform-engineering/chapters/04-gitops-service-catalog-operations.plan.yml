      style: Data flow diagram
    notes: "Introduce the 'Service Catalog with Runtime Visibility' pattern: 'MTTR reduced by providing instant context
      during incidents' at MEDIUM effort. Explain that a service catalog alone (listing what services exist) isn't
      enough—you need runtime context: current deployment version, health status, recent changes, dependencies, active
      alerts, owner info. Reference the 40-50% cognitive load reduction that high-maturity platform teams report—runtime
      visibility directly contributes by reducing the 'digging for context' during incidents. Explain how this connects
      to the 10% DORA performance improvement."
  - id: incident_acceleration
    heading: "Accelerating Incident Response: From Hours to Minutes"
    word_target: 220
    visual: null
    notes: "Synthesize how GitOps + runtime visibility work together during incidents: (1) GitOps provides instant rollback
      capability—tested, reliable rollbacks to last known good state; (2) Runtime visibility provides instant
      context—exactly what changed, what dependencies are affected, who owns the service; (3) Together, they reduce MTTR
      dramatically. Use a concrete example: a latency spike incident where the responder sees (via catalog) the
      deployment 5 minutes ago, (via GitOps) rolls back in 30 seconds, (via visibility) confirms resolution in 2
      minutes. Reference 55% platform engineering adoption and 92% CIOs planning AI integrations—hint at future
      AI-enhanced incident response."
  - id: summary
    heading: "Summary: Prevention Meets Response"
    word_target: 150
    visual: null
    notes: "Recap the two pillars: (1) GitOps prevents configuration drift and enables instant, reliable rollbacks; (2)

  - id: thundering_herd
    heading: Thundering Herd Prevention
    word_target: 350
    visual:
      type: d2
      template: before-after-optimization
      purpose: Visualize concurrency controls vs uncontrolled retry storms
    notes: "Define thundering herd: when many clients retry simultaneously after a failure. Cover prevention strategies: 1)
      Concurrency limits (reserved vs provisioned), 2) Caching with stale-while-revalidate, 3) Randomized jitter
      (already covered in retry section), 4) Circuit breaker pattern. Explain provisioned concurrency for cold start
      mitigation pattern. Show config for setting concurrency limits. Discuss the tension between 'retry failed
      requests' and 'prevent retry storms' - balance is key."
  - id: idempotent_design
    heading: Idempotent Function Design
    word_target: 350
    visual:
      type: code
      language: javascript
      purpose: Show idempotent function implementation pattern
    notes: "Explain idempotency: executing the same operation multiple times produces the same result. Critical for
      event-driven systems where retries are common. Cover: 1) Identifying keys (order ID, payment ID), 2) Checking
      before write (database conditional expressions), 3) Using idempotency tokens from event sources, 4) Storing
      processed event IDs in DynamoDB. Include full code example showing idempotent order processing. Mention why this
      matters: Lambda at scale means retries happen, and duplicate processing has business consequences."

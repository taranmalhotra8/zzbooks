# Quarto Book Configuration
# Generated by: make new-ebook

project:
  type: book
  output-dir: ../../_output/books/k8s-cost-guide

book:
  title: "Kubernetes Cost Guide"
  subtitle: "Optimizing Container Spending"
  author: "Zopdev Team"
  date: today
  chapters:
    - index.qmd
    - chapters/01-the-50000-month-incident.qmd
    - chapters/02-right-sizing-foundations.qmd
    - chapters/03-advanced-cost-patterns.qmd

filters:
  - d2

d2:
  layout: elk
  theme: NeutralDefault
  pad: 20

format:
  html:
    theme:
      light: [cosmo, brand, ../../_themes/zopdev-book.scss]
      dark: [darkly, brand, ../../_themes/zopdev-book.scss]
    grid:
      sidebar-width: 260px
      body-width: 800px
      margin-width: 280px
    toc: true
    toc-depth: 3
    number-sections: true
    code-link: true
    code-copy: true
    code-overflow: wrap
    include-after-body:
      - text: |
          <div class="reading-progress"></div>
          <script>window.addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(h>0)document.querySelector('.reading-progress').style.width=(window.scrollY/h*100)+'%';});</script>
      - file: ../../_themes/lightbox.html
      - file: ../../_themes/diagram-sizing.html
  pdf:
    documentclass: book
    classoption: [oneside, 11pt]
    pdf-engine: xelatex
    include-in-header: ../../_themes/preamble.tex
    toc: true
    number-sections: true
    colorlinks: true
    keep-tex: false
  epub:
    css: ../../_themes/zopdev-epub.css
    toc: true
    number-sections: true

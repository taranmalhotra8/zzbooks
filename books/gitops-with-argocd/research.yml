common_patterns:
  - name: Automated Sync with Self-Heal
    description: Configure auto-sync policies with self-healing enabled to automatically correct drift between Git state and
      cluster state
    typical_savings: Eliminates manual reconciliation toil; reduces configuration drift detection time to near-zero
    implementation_effort: Low
    risk: Low
    eligibility: All Argo CD applications; recommended for production environments
  - name: Multi-Cluster Management
    description: Use Argo CD to manage applications across multiple Kubernetes clusters from a single control plane
    typical_savings: Reduces operational overhead by 40-60% compared to managing individual cluster deployments
    implementation_effort: Medium
    risk: Medium
    eligibility: Organizations running multiple clusters (2+); especially relevant for 20+ clusters (25% of users)
  - name: ApplicationSets for Templated Deployments
    description: Deploy multiple applications from a single ApplicationSet manifest using generators (Git, Matrix, Cluster)
    typical_savings: Reduces deployment configuration code by 70-80% for multi-environment/multi-cluster setups
    implementation_effort: Medium
    risk: Low
    eligibility: Teams managing 10+ applications; required for scaling to 500+ applications (42% of users)
  - name: App of Apps Pattern
    description: Use a root Application to manage child Applications, enabling hierarchical deployment management
    typical_savings: Simplifies bootstrap processes; enables declarative multi-application orchestration
    implementation_effort: Low
    risk: Low
    eligibility: Recommended for managing 10 or fewer applications declaratively
  - name: Argo Rollouts for Progressive Delivery
    description: Implement canary and blue-green deployments using Argo Rollouts CRD instead of standard Deployments
    typical_savings: Reduces risk of failed releases; enables safer rollouts with automatic traffic shifting
    implementation_effort: High
    risk: Low
    eligibility: Teams requiring zero-downtime deployments and gradual traffic shifting
  - name: External Secrets Management
    description: Use External Secrets Operator or Sealed Secrets to manage sensitive data without committing to Git
    typical_savings: Eliminates security risk of plaintext secrets in Git; enables compliance requirements
    implementation_effort: Medium
    risk: Low
    eligibility: Required for production environments with compliance requirements

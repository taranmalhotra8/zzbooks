    visual: null
    notes: "Open with industry data hook about platform engineering adoption. Use the Gartner prediction that 80% of
      software engineering organizations will have platform teams by 2026, and the statistic that 55% of organizations
      have already adopted platform engineering in 2025. Hook: The cost of NOT building golden paths is visible in every
